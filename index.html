<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nefsi Asrifah | Echi - Property Consultant</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        
        :root {
            --gold: #a68966;
            --dark: #4a3728;
            --cream: #fdfbf7;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--cream); 
            color: var(--dark); 
            margin: 0;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .nav-glass { 
            background: rgba(255, 255, 255, 0.98); 
            backdrop-filter: blur(10px); 
            z-index: 1000; 
            border-bottom: 1px solid #eee;
        }

        .unit-card {
            background: white;
            border-radius: 2rem;
            overflow: hidden;
            border: 1px solid #f0ebe3;
            box-shadow: 0 10px 40px rgba(74, 55, 40, 0.03);
            margin-bottom: 2rem;
            display: flex;
            flex-direction: column;
        }

        .main-view {
            width: 100%;
            aspect-ratio: 4/3;
            background: #f7f3ed;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .main-view img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: opacity 0.4s ease;
        }

        .swiper-container {
            padding: 10px 15px 20px 15px;
            background: #fff;
        }
        .swiper-slide {
            width: 100px;
            height: 65px;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            border: 2px solid transparent;
            transition: 0.3s;
            background: #f0ebe3;
        }
        .swiper-slide-thumb-active {
            border-color: var(--gold);
        }
        .swiper-slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .phase-btn {
            padding: 10px 18px;
            border-radius: 10px;
            font-size: 10px;
            font-weight: 800;
            border: 1px solid #eee;
            background: white;
            transition: 0.3s;
            white-space: nowrap;
        }
        .phase-btn.active {
            background: var(--dark);
            color: white;
            border-color: var(--dark);
        }

        #mobile-menu {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; z-index: 2000; display: none;
            flex-direction: column; align-items: center; justify-content: center;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .btn-action {
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .btn-action:active {
            transform: scale(0.92);
        }
    </style>
</head>
<body>

    <nav class="fixed top-0 w-full nav-glass px-6 py-4 flex justify-between items-center">
        <div class="font-extrabold text-sm tracking-tighter uppercase">NEFSI ASRIFAH <span class="text-[#a68966]">| ECHI</span></div>
        <button onclick="document.getElementById('mobile-menu').style.display='flex'" class="p-2 text-dark"><i class="fa-solid fa-bars-staggered text-xl"></i></button>
    </nav>

    <div id="mobile-menu">
        <button onclick="document.getElementById('mobile-menu').style.display='none'" class="absolute top-6 right-6 text-3xl"><i class="fa-solid fa-xmark"></i></button>
        <a href="#top" onclick="document.getElementById('mobile-menu').style.display='none'" class="py-5 text-2xl font-black uppercase">Beranda</a>
        <a href="#katalog" onclick="document.getElementById('mobile-menu').style.display='none'" class="py-5 text-2xl font-black uppercase">Unit Pilihan</a>
        <a href="#kpr" onclick="document.getElementById('mobile-menu').style.display='none'" class="py-5 text-2xl font-black uppercase">Simulasi KPR</a>
    </div>

    <div id="top" class="pt-28 pb-10 px-6">
        <div class="max-w-4xl mx-auto flex flex-col items-center text-center">
            <div class="w-28 h-28 rounded-full overflow-hidden border-4 border-white shadow-lg mb-4">
                <img src="wajah.jpg" class="w-full h-full object-cover" onerror="this.src='https://placehold.co/400x400?text=Echi'">
            </div>
            <span class="text-[9px] font-extrabold text-[#a68966] uppercase tracking-[0.4em] mb-2">Park Serpong Property Consultant</span>
            <h1 class="text-3xl font-black tracking-tight mb-2">ECHI ASRIFAH</h1>
            <p class="text-gray-400 text-[11px] max-w-xs mx-auto leading-relaxed">Wujudkan hunian impian dengan pelayanan transparan dan profesional.</p>
        </div>
    </div>

    <section id="katalog" class="py-6 px-6">
        <div class="max-w-6xl mx-auto">
            <div class="flex gap-2 overflow-x-auto no-scrollbar mb-8 pb-2">
                <button onclick="renderUnits(7)" id="btn-7" class="phase-btn active">FASE 07</button>
                <button onclick="renderUnits(6)" id="btn-6" class="phase-btn">FASE 06</button>
                <button onclick="renderUnits(5)" id="btn-5" class="phase-btn">FASE 05</button>
            </div>
            
            <div id="unit-display-area" class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                <!-- Unit didorong oleh JS -->
            </div>
        </div>
    </section>

    <section id="kpr" class="py-20 px-6 bg-white border-t border-gray-100">
        <div class="max-w-xl mx-auto">
            <h3 class="text-center font-black uppercase tracking-widest text-[#a68966] mb-12">Simulasi Angsuran</h3>
            <div class="space-y-4">
                <div class="bg-[#fdfbf7] p-5 rounded-2xl border border-gray-200">
                    <label class="text-[9px] font-black uppercase text-gray-400 block mb-1">Harga Properti (Rp)</label>
                    <input type="text" id="kpr-disp" value="325.000.000" oninput="formatAndCalc(this)" class="w-full bg-transparent border-none outline-none text-xl font-black">
                    <input type="hidden" id="kpr-raw" value="325000000">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-[#fdfbf7] p-5 rounded-2xl border border-gray-200">
                        <label class="text-[9px] font-black uppercase text-gray-400 block mb-1">Uang Muka (%)</label>
                        <input type="number" id="dp-val" value="5" oninput="calc()" class="w-full bg-transparent border-none font-black text-lg outline-none">
                    </div>
                    <div class="bg-[#fdfbf7] p-5 rounded-2xl border border-gray-200">
                        <label class="text-[9px] font-black uppercase text-gray-400 block mb-1">Tenor (Tahun)</label>
                        <input type="number" id="tenor-val" value="20" oninput="calc()" class="w-full bg-transparent border-none font-black text-lg outline-none">
                    </div>
                </div>
                <div class="mt-10 bg-dark p-8 rounded-[2rem] text-center shadow-xl">
                    <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-2">Estimasi Per Bulan</p>
                    <h2 id="hasil-cicilan" class="text-3xl font-black text-white mb-8 tracking-tighter">Rp 2.050.000</h2>
                    <a id="wa-link" href="https://wa.me/628111982833" target="_blank" class="block w-full py-4 bg-[#a68966] text-white rounded-xl font-black text-[10px] uppercase tracking-[0.2em] btn-action">Chat WA Ke Echi</a>
                </div>
            </div>
        </div>
    </section>

    <footer class="py-12 text-center text-[9px] font-bold text-gray-300 uppercase tracking-[0.4em]">
        &copy; 2024 Nefsi Asrifah | Echi Park Serpong
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

    <script>
        const WA_NUMBER = "628111982833";
        const unitData = {
            5: [
                { name: "Perunggu Livin Tipe B", tag: "305 Jt", val: 305000000, photos: ["unit-1.jpg", "unit-1.1.jpg", "unit-1.2.jpg", "unit-1.3.jpg"] },
                { name: "Perunggu Livin Tipe BB", tag: "390 Jt", val: 390000000, photos: ["unit-2.jpg", "unit-2.1.jpg", "unit-2.2.jpg", "unit-2.3.jpg"] },
                { name: "Quartz Livin Tipe Q", tag: "450 Jt", val: 450000000, photos: ["unit-3.jpg", "unit-3.1.jpg", "unit-3.2.jpg", "unit-3.3.jpg"] },
                { name: "TreeTops Livin Tipe", tag: "520 Jt", val: 520000000, photos: ["unit-4.jpg", "unit-4.1.jpg", "unit-4.2.jpg", "unit-4.3.jpg", "unit-4.4.jpg"] },
                { name: "Gold Livin Tipe G", tag: "580 Jt", val: 580000000, photos: ["unit-5.jpg", "unit-5.1.jpg", "unit-5.2.jpg", "unit-5.3.jpg"] },
                { name: "GoldTops Livin Type GT", tag: "650 Jt", val: 650000000, photos: ["unit-6.jpg", "unit-6.1.jpg", "unit-6.2.jpg", "unit-6.3.jpg"] }
            ],
            6: [
                { name: "Perunggu Livin Tipe B", tag: "315 Jt", val: 315000000, photos: ["unit-1.jpg", "unit-1.1.jpg", "unit-1.2.jpg", "unit-1.3.jpg"] },
                { name: "Quartz Livin Tipe Q", tag: "460 Jt", val: 460000000, photos: ["unit-2.jpg", "unit-2.1.jpg", "unit-2.2.jpg", "unit-2.3.jpg"] },
                { name: "TreeTops Livin", tag: "530 Jt", val: 530000000, photos: ["unit-3.jpg", "unit-3.1.jpg", "unit-3.2.jpg", "unit-3.3.jpg"] },
                { name: "Gold Livin Tipe G", tag: "595 Jt", val: 595000000, photos: ["unit-4.jpg", "unit-4.1.jpg", "unit-4.2.jpg", "unit-4.3.jpg"] },
                { name: "GoldTops Livin Type GT", tag: "670 Jt", val: 670000000, photos: ["unit-5.jpg", "unit-5.1.jpg", "unit-5.2.jpg", "unit-5.3.jpg", "unit-5.4.jpg"] }
            ],
            7: [
                { name: "Perunggu Beverly Livin", tag: "325 Jt", val: 325000000, photos: ["unit-1.jpg", "unit-1.1.jpg", "unit-1.2.jpg", "unit-1.3.jpg"] },
                { name: "Silver Beverly Livin", tag: "410 Jt", val: 410000000, photos: ["unit-2.jpg", "unit-2.1.jpg", "unit-2.2.jpg", "unit-2.3.jpg"] },
                { name: "Urban Beverly Livin", tag: "500 Jt", val: 500000000, photos: ["unit-3.jpg", "unit-3.1.jpg", "unit-3.2.jpg", "unit-3.3.jpg"] },
                { name: "TreeTops Beverly Livin", tag: "550 Jt", val: 550000000, photos: ["unit-4.jpg", "unit-4.1.jpg", "unit-4.2.jpg", "unit-4.3.jpg"] },
                { name: "Gold Beverly Livin", tag: "610 Jt", val: 610000000, photos: ["unit-5.jpg", "unit-5.1.jpg", "unit-5.2.jpg", "unit-5.3.jpg"] },
                { name: "GoldTops Beverly Livin", tag: "690 Jt", val: 690000000, photos: ["unit-6.jpg", "unit-6.1.jpg", "unit-6.2.jpg", "unit-6.3.jpg"] }
            ]
        };

        let activeSwipers = [];

        function renderUnits(fase) {
            const container = document.getElementById('unit-display-area');
            container.innerHTML = '';
            activeSwipers.forEach(s => s.destroy());
            activeSwipers = [];

            document.querySelectorAll('.phase-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-'+fase).classList.add('active');

            unitData[fase].forEach((u, i) => {
                const uid = `unit-${fase}-${i}`;
                const thumbHtml = u.photos.map(p => `
                    <div class="swiper-slide">
                        <img src="fase-${fase}/${p}" onerror="this.src='https://placehold.co/200x150/f7f3ed/a68966?text=Image'">
                    </div>
                `).join('');

                container.innerHTML += `
                    <div class="unit-card">
                        <div class="main-view">
                            <img id="main-img-${uid}" src="fase-${fase}/${u.photos[0]}" onerror="this.src='https://placehold.co/600x450/f7f3ed/a68966?text=${u.name}'">
                        </div>

                        <div class="swiper swiper-container" id="swiper-${uid}">
                            <div class="swiper-wrapper">${thumbHtml}</div>
                        </div>

                        <div class="px-8 pb-8 pt-2">
                            <h4 class="font-black text-xl uppercase tracking-tighter mb-4">${u.name}</h4>
                            
                            <div class="grid grid-cols-2 gap-3">
                                <!-- Pintasan KPR -->
                                <button onclick="setKPR(${u.val}, '${u.name}')" class="flex items-center justify-center gap-2 bg-[#fdfbf7] border border-gray-100 py-4 rounded-2xl btn-action">
                                    <i class="fa-solid fa-calculator text-[#a68966]"></i>
                                    <span class="text-[9px] font-black uppercase tracking-widest text-[#a68966]">Hitung KPR</span>
                                </button>
                                
                                <!-- Pintasan WA Echi -->
                                <a href="https://wa.me/${WA_NUMBER}?text=Halo%20Echi,%20saya%20tertarik%20dengan%20unit%20${u.name}%20di%20Fase%200${fase}.%20Boleh%20tanya%20detailnya?" 
                                   target="_blank" 
                                   class="flex items-center justify-center gap-2 bg-dark py-4 rounded-2xl btn-action shadow-lg">
                                    <i class="fa-brands fa-whatsapp text-white"></i>
                                    <span class="text-[9px] font-black uppercase tracking-widest text-white">WA Echi</span>
                                </a>
                            </div>

                            <div class="mt-6 flex justify-between items-center border-t border-gray-50 pt-6">
                                <div>
                                    <p class="text-[7px] font-black text-gray-300 uppercase mb-1">Estimasi Harga Mulai</p>
                                    <p class="font-black text-lg text-[#a68966]">Rp ${u.tag}</p>
                                </div>
                                <span class="bg-gray-50 px-3 py-1 rounded-full text-[8px] font-black text-gray-400 uppercase">Fase 0${fase}</span>
                            </div>
                        </div>
                    </div>
                `;
            });

            setTimeout(() => {
                unitData[fase].forEach((u, i) => {
                    const uid = `unit-${fase}-${i}`;
                    const swiper = new Swiper(`#swiper-${uid}`, {
                        slidesPerView: "auto",
                        spaceBetween: 8,
                        freeMode: true,
                        loop: true,
                        autoplay: { delay: 3000, disableOnInteraction: true },
                        on: {
                            click: function(s) {
                                if(s.clickedSlide) {
                                    const src = s.clickedSlide.querySelector('img').src;
                                    const main = document.getElementById('main-img-'+uid);
                                    main.style.opacity = '0.5';
                                    setTimeout(() => { main.src = src; main.style.opacity = '1'; }, 150);
                                }
                            }
                        }
                    });
                    activeSwipers.push(swiper);
                });
            }, 100);
        }

        function formatRibuan(n) { return n.toString().replace(/\B(?=(\d{3})+(?!\d))/g, "."); }
        
        function formatAndCalc(el) {
            let v = el.value.replace(/\D/g, "");
            document.getElementById('kpr-raw').value = v;
            el.value = formatRibuan(v);
            calc();
        }

        function calc() {
            const h = parseFloat(document.getElementById('kpr-raw').value) || 0;
            const dp = parseFloat(document.getElementById('dp-val').value) || 0;
            const t = parseFloat(document.getElementById('tenor-val').value) || 1;
            const pinjam = h - (h * dp / 100);
            const bunga = 0.05 / 12; 
            const bulan = t * 12;
            const cicilan = (pinjam * bunga) / (1 - Math.pow(1 + bunga, -bulan));
            
            document.getElementById('hasil-cicilan').innerText = "Rp " + formatRibuan(Math.round(cicilan || 0));
            document.getElementById('wa-link').href = `https://wa.me/${WA_NUMBER}?text=Halo%20Echi,%20saya%20sudah%20hitung%20simulasi%20KPR%20dengan%20harga%20unit%20Rp%20${formatRibuan(h)}.%20Bisa%20bantu%20cek%20promonya?`;
        }

        function setKPR(v, name) {
            document.getElementById('kpr-raw').value = v;
            document.getElementById('kpr-disp').value = formatRibuan(v);
            calc();
            document.getElementById('kpr').scrollIntoView({ behavior: 'smooth' });
        }

        window.onload = () => { renderUnits(7); calc(); };
    </script>
</body>
</html>
