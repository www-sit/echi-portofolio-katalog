<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nefsi Asrifah | Echi - Official Property Catalog</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        :root { --gold: #a68966; --dark: #4a3728; --cream: #fdfbf7; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--cream); color: var(--dark); margin: 0; overflow-x: hidden; }
        .nav-glass { background: rgba(253, 251, 247, 0.98); backdrop-filter: blur(10px); z-index: 1000; }
        
        /* Kartu Unit Modern */
        .unit-card {
            background: white;
            border-radius: 2.5rem;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
            border: 1px solid rgba(0,0,0,0.02);
        }
        .unit-card:hover { transform: translateY(-10px); box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.1); }

        /* Efek Transparan untuk Foto Unit */
        .img-container {
            height: 280px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: #fcfcfc;
        }
        .unit-img {
            max-height: 100%;
            width: auto;
            object-fit: contain;
            /* Menghilangkan background hitam/putih pada foto unit */
            mix-blend-mode: multiply; 
            transition: 0.5s;
        }
        .unit-card:hover .unit-img { transform: scale(1.05); }

        /* Modal Galeri */
        #gallery-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.96);
            z-index: 10000;
            align-items: center;
            justify-content: center;
        }
        #gallery-overlay.active { display: flex; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <nav class="fixed w-full nav-glass px-6 py-4 border-b border-gray-100">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="font-extrabold text-lg uppercase">Nefsi Asrifah | <span class="text-[#a68966]">Echi</span></div>
            <div class="hidden md:flex gap-8 text-[10px] font-bold uppercase tracking-widest">
                <a href="#home" class="hover:text-[#a68966]">Beranda</a>
                <a href="#katalog" class="hover:text-[#a68966]">Katalog</a>
                <a href="#kpr" class="hover:text-[#a68966]">Simulasi KPR</a>
            </div>
            <button onclick="toggleMobileMenu()" class="md:hidden text-xl"><i class="fas fa-bars"></i></button>
        </div>
        <div id="mobile-menu" class="hidden flex-col gap-4 mt-4 text-center md:hidden pb-4">
            <a href="#home" onclick="toggleMobileMenu()" class="text-xs font-bold uppercase">Beranda</a>
            <a href="#katalog" onclick="toggleMobileMenu()" class="text-xs font-bold uppercase">Katalog</a>
            <a href="#kpr" onclick="toggleMobileMenu()" class="text-xs font-bold uppercase">Simulasi KPR</a>
        </div>
    </nav>

    <section id="home" class="min-h-screen pt-28 px-6 flex items-center">
        <div class="max-w-7xl mx-auto grid lg:grid-cols-2 gap-12 items-center w-full">
            <div data-aos="fade-right">
                <span class="text-[10px] font-bold text-[#a68966] uppercase tracking-[0.4em] mb-4 block">Sales Inhouse Lippoland</span>
                <h1 class="text-5xl lg:text-7xl font-black mb-6 leading-none">Nefsi <br><span class="text-[#a68966]">Asrifah</span></h1>
                <div class="flex gap-4">
                    <a href="#katalog" class="bg-[#a68966] text-white px-8 py-4 rounded-xl font-bold text-xs uppercase tracking-widest shadow-lg">Lihat Unit</a>
                    <a href="https://wa.me/628111982833" class="bg-white border border-gray-100 px-8 py-4 rounded-xl font-bold text-xs uppercase tracking-widest">WhatsApp</a>
                </div>
            </div>
            <div class="flex justify-center" data-aos="zoom-in">
                <div class="bg-white p-4 rounded-[3rem] shadow-2xl">
                    <img src="wajah.jpg" class="w-[300px] h-[400px] object-cover rounded-[2.5rem]" onerror="this.src='https://placehold.co/400x550?text=Echi'">
                </div>
            </div>
        </div>
    </section>

    <section id="katalog" class="py-24 px-6 bg-white rounded-[4rem] shadow-sm mt-12">
        <div class="max-w-7xl mx-auto">
            <div class="flex gap-4 overflow-x-auto no-scrollbar pb-8 mb-10 justify-start md:justify-center">
                <button onclick="changePhase(7)" id="p7" class="phase-btn px-8 py-3 bg-gray-50 rounded-xl font-bold text-[10px] uppercase border border-gray-100">Fase 7</button>
                <button onclick="changePhase(6)" id="p6" class="phase-btn px-8 py-3 bg-gray-50 rounded-xl font-bold text-[10px] uppercase border border-gray-100">Fase 6</button>
                <button onclick="changePhase(5)" id="p5" class="phase-btn px-8 py-3 bg-gray-50 rounded-xl font-bold text-[10px] uppercase border border-gray-100">Fase 5</button>
            </div>
            <div id="unit-grid" class="grid md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
        </div>
    </section>

    <section id="kpr" class="py-24 px-6 max-w-4xl mx-auto">
        <div class="bg-[#fdfbf7] p-10 rounded-[3rem] shadow-xl border border-gray-50" data-aos="fade-up">
            <h3 class="text-xl font-black uppercase text-center mb-10">Simulasi KPR</h3>
            <div class="grid md:grid-cols-2 gap-10">
                <div class="space-y-6">
                    <div>
                        <label class="text-[9px] font-bold text-gray-400 uppercase">Harga Unit (Rp)</label>
                        <input type="text" id="kpr-h-disp" value="305.000.000" oninput="inputHarga(this)" class="w-full text-xl font-black border-b-2 border-gray-100 outline-none focus:border-[#a68966] bg-transparent">
                        <input type="hidden" id="kpr-h-val" value="305000000">
                    </div>
                    <div class="flex gap-4">
                        <div class="w-1/2">
                            <label class="text-[9px] font-bold text-gray-400 uppercase">DP %</label>
                            <input type="number" id="kpr-dp" value="5" oninput="hitungKPR()" class="w-full font-bold border-b border-gray-100 outline-none bg-transparent">
                        </div>
                        <div class="w-1/2">
                            <label class="text-[9px] font-bold text-gray-400 uppercase">Tenor Thn</label>
                            <input type="number" id="kpr-t" value="20" oninput="hitungKPR()" class="w-full font-bold border-b border-gray-100 outline-none bg-transparent">
                        </div>
                    </div>
                </div>
                <div class="bg-white p-8 rounded-2xl text-center">
                    <p class="text-[9px] font-bold text-gray-400 mb-2 uppercase">Angsuran / Bulan</p>
                    <h4 id="kpr-hasil" class="text-3xl font-black text-[#a68966] mb-6">Rp 1.900.000</h4>
                    <button onclick="waKPR()" class="w-full bg-[#4a3728] text-white py-3 rounded-xl font-bold text-[10px] uppercase">Konsultasi KPR</button>
                </div>
            </div>
        </div>
    </section>

    <div id="gallery-overlay" onclick="closeGallery()">
        <button class="absolute top-10 right-10 text-white text-3xl"><i class="fas fa-times"></i></button>
        <button onclick="prevImg(event)" class="absolute left-6 text-white text-4xl"><i class="fas fa-chevron-left"></i></button>
        <div class="max-w-4xl px-4 flex flex-col items-center" onclick="event.stopPropagation()">
            <img id="modal-img" src="" class="max-h-[80vh] rounded-2xl shadow-2xl">
            <p id="modal-caption" class="text-white text-center mt-4 font-bold text-[10px] uppercase tracking-widest"></p>
        </div>
        <button onclick="nextImg(event)" class="absolute right-6 text-white text-4xl"><i class="fas fa-chevron-right"></i></button>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        const waNum = "628111982833";
        
        // --- ROLLBACK: MENGGUNAKAN NAMA FILE DARI CODINGAN BERHASIL SEBELUMNYA ---
        const units = {
            7: [
                { name: "Wonder House 2L", p: "305 Jt", v: 305000000, 
                  photos: ["fase-7/unit-1.jpg", "fase-7/detail-1a.jpg", "fase-7/detail-1b.jpg"] },
                { name: "Urban Livin", p: "569 Jt", v: 569000000, 
                  photos: ["fase-7/unit-2.jpg", "fase-7/detail-2a.jpg"] },
                { name: "Wonder House 3L", p: "658 Jt", v: 658000000, 
                  photos: ["fase-7/unit-3.jpg", "fase-7/detail-3a.jpg"] }
            ],
            6: [
                { name: "Bronze Alpha", p: "397 Jt", v: 397000000, photos: ["fase-6/unit-1.jpg"] }
            ],
            5: [
                { name: "Bronze Unit", p: "393 Jt", v: 393000000, photos: ["fase-5/unit-1.jpg"] }
            ]
        };

        let currentGallery = [];
        let galleryIdx = 0;

        function toggleMobileMenu() { document.getElementById('mobile-menu').classList.toggle('hidden'); }
        function formatMoney(n) { return n.toString().replace(/\B(?=(\d{3})+(?!\d))/g, "."); }

        function changePhase(p) {
            document.querySelectorAll('.phase-btn').forEach(b => b.classList.remove('bg-[#4a3728]', 'text-white'));
            document.getElementById('p'+p).classList.add('bg-[#4a3728]', 'text-white');

            const grid = document.getElementById('unit-grid');
            grid.innerHTML = '';
            units[p].forEach((u, i) => {
                grid.innerHTML += `
                    <div class="unit-card" data-aos="fade-up" data-aos-delay="${i*100}">
                        <div class="img-container cursor-pointer" onclick="openGallery('${p}', ${i})">
                            <img src="${u.photos[0]}" class="unit-img" onerror="this.src='https://placehold.co/600x400?text=${u.name}'">
                        </div>
                        <div class="p-8">
                            <h4 class="text-lg font-black uppercase mb-4">${u.name}</h4>
                            <p class="text-[9px] font-bold text-[#a68966] block mb-1">HARGA MULAI</p>
                            <p class="text-2xl font-black italic mb-6">Rp ${u.p}</p>
                            <div class="grid grid-cols-2 gap-3">
                                <button onclick="selectUnitKPR(${u.v})" class="text-[9px] font-bold uppercase py-3 border border-gray-100 rounded-xl">KPR</button>
                                <button onclick="waUnit('${u.name}', ${p})" class="text-[9px] font-bold uppercase py-3 bg-[#a68966] text-white rounded-xl shadow-md">Chat</button>
                            </div>
                        </div>
                    </div>
                `;
            });
            AOS.refresh();
        }

        function openGallery(phase, idx) {
            currentGallery = units[phase][idx].photos;
            galleryIdx = 0;
            updateGallery();
            document.getElementById('gallery-overlay').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeGallery() { document.getElementById('gallery-overlay').classList.remove('active'); document.body.style.overflow = 'auto'; }
        
        function updateGallery() {
            const img = document.getElementById('modal-img');
            img.src = currentGallery[galleryIdx];
            document.getElementById('modal-caption').innerText = `Foto ${galleryIdx + 1} dari ${currentGallery.length}`;
        }

        function nextImg(e) { e.stopPropagation(); galleryIdx = (galleryIdx + 1) % currentGallery.length; updateGallery(); }
        function prevImg(e) { e.stopPropagation(); galleryIdx = (galleryIdx - 1 + currentGallery.length) % currentGallery.length; updateGallery(); }

        function inputHarga(e) {
            let v = e.value.replace(/\D/g, "");
            document.getElementById('kpr-h-val').value = v;
            e.value = formatMoney(v);
            hitungKPR();
        }

        function hitungKPR() {
            const h = parseFloat(document.getElementById('kpr-h-val').value) || 0;
            const d = parseFloat(document.getElementById('kpr-dp').value) || 0;
            const t = parseFloat(document.getElementById('kpr-t').value) || 0;
            const p = h * (1 - (d/100));
            const b = 0.05 / 12;
            const n = t * 12;
            const c = n > 0 ? (p * b) / (1 - Math.pow(1 + b, -n)) : 0;
            document.getElementById('kpr-hasil').innerText = "Rp " + formatMoney(Math.round(c));
        }

        function selectUnitKPR(v) {
            document.getElementById('kpr-h-val').value = v;
            document.getElementById('kpr-h-disp').value = formatMoney(v);
            hitungKPR();
            document.getElementById('kpr').scrollIntoView({behavior: 'smooth'});
        }

        function waUnit(n, ph) {
            const m = encodeURIComponent(`Halo Kak Echi, saya tertarik unit ${n} di Fase ${ph}.`);
            window.open(`https://wa.me/${waNum}?text=${m}`, '_blank');
        }

        function waKPR() {
            const h = document.getElementById('kpr-h-disp').value;
            const res = document.getElementById('kpr-hasil').innerText;
            const m = encodeURIComponent(`Halo Kak Echi, saya simulasi KPR seharga Rp ${h} dengan cicilan ${res}.`);
            window.open(`https://wa.me/${waNum}?text=${m}`, '_blank');
        }

        window.onload = () => { AOS.init({ duration: 800, once: true }); changePhase(7); hitungKPR(); };
    </script>
</body>
</html>
