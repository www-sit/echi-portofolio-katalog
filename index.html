<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nefsi Asrifah | Echi - Property Consultant</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap');
        
        :root {
            --gold: #c5a075;
            --page-bg: #000000;
            /* Kolom Cream Keputihan */
            --card-cream-white: #f9f9f2; 
            --accent-dark: #1a1a1a;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--page-bg); 
            color: white; 
            margin: 0;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        .nav-glass { 
            background: rgba(0, 0, 0, 0.95); 
            backdrop-filter: blur(10px); 
            z-index: 1000; 
            border-bottom: 1px solid #222;
        }

        /* --- PROFILE SECTION --- */
        .profile-container {
            transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding-top: 100px;
            padding-bottom: 40px;
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
        }

        .profile-image-wrapper {
            width: 110px; height: 110px;
            border-radius: 50%; overflow: hidden;
            border: 2px solid var(--gold);
            margin-bottom: 20px;
            background: #111;
        }

        /* --- UNIT CARD DESIGN --- */
        .unit-card {
            background: var(--card-cream-white); 
            border-radius: 3rem; 
            overflow: hidden;
            margin-bottom: 4rem;
            color: var(--accent-dark); 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .hero-view {
            width: 100%; 
            aspect-ratio: 1/1; 
            /* Latar belakang container hero dibuat gelap agar mode screen bekerja sempurna */
            background: #111; 
            overflow: hidden; 
            position: relative; 
            display: flex;
            align-items: center; 
            justify-content: center;
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .hero-view.is-wide {
            aspect-ratio: 16/9;
            background: #000;
        }

        .hero-view img { 
            width: 100%; 
            height: 100%; 
            object-fit: contain;
            /* MODE SCREEN: Menghilangkan latar HITAM pada gambar */
            mix-blend-mode: screen; 
            transition: opacity 0.3s ease;
        }

        /* Saat melihat detail foto pendukung, blend mode dihilangkan */
        .hero-view.no-blend img {
            mix-blend-mode: normal !important;
            object-fit: cover;
        }

        .card-content {
            padding: 2rem;
        }

        .unit-title {
            font-weight: 800;
            font-size: 1.6rem;
            text-transform: uppercase;
            letter-spacing: -0.02em;
            margin-bottom: 1.5rem;
            color: #000;
        }

        .thumb-img-wrapper {
            width: 100%; aspect-ratio: 16/9; overflow: hidden;
            border-radius: 1.5rem; cursor: pointer;
            background: #eee;
            border: 1px solid rgba(0,0,0,0.05);
        }
        .thumb-img-wrapper img { 
            width: 100%; height: 100%; object-fit: cover; 
        }

        .btn-chat-wa {
            background-color: #000 !important;
            color: #fff !important;
            display: flex; align-items: center; justify-content: center;
            gap: 10px; padding: 1.25rem; border-radius: 1.5rem;
            text-align: center; font-weight: 800; font-size: 12px;
            text-transform: uppercase;
            width: 100%;
            transition: transform 0.2s;
        }
        .btn-chat-wa:active { transform: scale(0.98); }

        .price-box {
            background: rgba(0, 0, 0, 0.03); 
            padding: 1.5rem; 
            border-radius: 2rem; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .phase-btn {
            padding: 12px 25px; border-radius: 15px; font-size: 11px;
            font-weight: 800; border: 1px solid #333; background: #000;
            white-space: nowrap; transition: 0.3s; color: #666;
        }
        .phase-btn.active { background: var(--gold); color: #000 !important; border-color: var(--gold); }

        .swiper-slide { width: 200px !important; }
        .no-scrollbar::-webkit-scrollbar { display: none; }

        /* --- KPR --- */
        .kpr-input-card { background: #0a0a0a; border: 1px solid #1a1a1a; padding: 1.5rem; border-radius: 2rem; }
        .kpr-result-box {
            background-color: var(--gold) !important;
            padding: 2.5rem; border-radius: 2.5rem; text-align: center;
            color: #000;
        }
        .kpr-result-value { font-size: 2rem; font-weight: 900; margin-bottom: 1.5rem; display: block; }
    </style>
</head>
<body>

    <nav class="fixed top-0 w-full nav-glass px-6 py-5 flex justify-between items-center">
        <div class="font-extrabold text-sm tracking-tighter uppercase text-white">NEFSI ASRIFAH <span class="text-[#c5a075]">| ECHI</span></div>
        <button onclick="toggleMenu(true)" class="p-1"><i class="fa-solid fa-bars-staggered text-xl"></i></button>
    </nav>

    <div id="mobile-menu" class="hidden fixed inset-0 bg-black z-[2000] flex-col items-center justify-center">
        <button onclick="toggleMenu(false)" class="absolute top-10 right-10 text-3xl text-white"><i class="fa-solid fa-times"></i></button>
        <a href="#top" onclick="toggleMenu(false)" class="text-2xl font-black mb-8 uppercase text-white">Home</a>
        <a href="#katalog" onclick="toggleMenu(false)" class="text-2xl font-black mb-8 uppercase text-white">Catalog</a>
        <a href="#kpr" onclick="toggleMenu(false)" class="text-2xl font-black mb-8 uppercase text-white">Simulation</a>
    </div>

    <header id="top">
        <div class="profile-container">
            <div class="profile-image-wrapper">
                <img src="wajah.jpg" class="w-full h-full object-cover" onerror="this.src='https://placehold.co/400x400/111/c5a075?text=Echi'">
            </div>
            <div class="profile-text">
                <span class="text-[10px] font-bold text-[#c5a075] uppercase tracking-[0.5em] mb-3 block">Property Consultant</span>
                <h1 class="text-4xl font-black tracking-tighter mb-2 uppercase text-white">Estate by Echi</h1>
                <p class="text-gray-500 text-[11px] max-w-[300px] leading-relaxed mx-auto">Luxury living with Park Serpong expert consultant.</p>
            </div>
        </div>
    </header>

    <section id="katalog" class="py-10 px-5">
        <div class="max-w-4xl mx-auto">
            <div class="flex gap-3 overflow-x-auto no-scrollbar mb-12 pb-2 justify-center">
                <button onclick="renderUnits(7)" id="btn-7" class="phase-btn active">PHASE 07</button>
                <button onclick="renderUnits(6)" id="btn-6" class="phase-btn">PHASE 06</button>
                <button onclick="renderUnits(5)" id="btn-5" class="phase-btn">PHASE 05</button>
            </div>
            <div id="unit-list"></div>
        </div>
    </section>

    <section id="kpr" class="py-20 px-6 bg-[#050505]">
        <div class="max-w-md mx-auto">
            <h3 class="text-center font-black uppercase text-[#c5a075] mb-12 tracking-widest text-sm">Mortgage Calculation</h3>
            <div class="space-y-5">
                <div class="kpr-input-card">
                    <label class="text-[10px] font-bold text-gray-600 uppercase block mb-3">Unit Price</label>
                    <div class="flex items-center">
                        <span class="text-gray-700 font-bold mr-2 text-xl">Rp</span>
                        <input type="text" id="kpr-disp" value="325.000.000" oninput="formatAndCalc(this)" class="w-full bg-transparent border-none outline-none text-2xl font-black tracking-tighter text-white">
                    </div>
                    <input type="hidden" id="kpr-raw" value="325000000">
                </div>
                <div class="grid grid-cols-2 gap-5">
                    <div class="kpr-input-card">
                        <label class="text-[10px] font-bold text-gray-600 uppercase block mb-2">DP (%)</label>
                        <input type="number" id="dp-val" value="5" oninput="calc()" class="w-full bg-transparent border-none font-bold text-lg outline-none text-white">
                    </div>
                    <div class="kpr-input-card">
                        <label class="text-[10px] font-bold text-gray-600 uppercase block mb-2">Years</label>
                        <input type="number" id="tenor-val" value="20" oninput="calc()" class="w-full bg-transparent border-none font-bold text-lg outline-none text-white">
                    </div>
                </div>
                <div class="mt-10 kpr-result-box">
                    <p class="text-[11px] font-black uppercase mb-4 opacity-50">Monthly Payment</p>
                    <span id="hasil-cicilan" class="kpr-result-value">Rp 2.050.000</span>
                    <a href="https://wa.me/628111982833" target="_blank" class="block w-full py-5 bg-black text-white rounded-2xl font-bold text-[12px] uppercase tracking-widest">Consult via WhatsApp</a>
                </div>
            </div>
        </div>
    </section>

    <footer class="py-20 text-center text-[10px] font-bold text-gray-800 uppercase tracking-[0.6em]">
        &copy; 2024 NEFSI ASRIFAH | PARK SERPONG
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        const WA_NUMBER = "628111982833";
        const unitData = {
            5: [
                { name: "Perunggu Livin B", tag: "305 Jt", val: 305000000, photos: ["fase-5/unit-1.jpg", "fase-5/unit-1.1.jpg", "fase-5/unit-1.2.jpg"] },
                { name: "Perunggu BB", tag: "390 Jt", val: 390000000, photos: ["fase-5/unit-2.jpg", "fase-5/unit-2.1.jpg", "fase-5/unit-2.2.jpg"] },
                { name: "Quartz Livin Q", tag: "450 Jt", val: 450000000, photos: ["fase-5/unit-3.jpg", "fase-5/unit-3.1.jpg", "fase-5/unit-3.2.jpg"] }
            ],
            6: [
                { name: "Quartz Tipe Q", tag: "460 Jt", val: 460000000, photos: ["fase-6/unit-2.jpg", "fase-6/unit-2.1.jpg", "fase-6/unit-2.2.jpg"] },
                { name: "Gold Tipe G", tag: "595 Jt", val: 595000000, photos: ["fase-6/unit-4.jpg", "fase-6/unit-4.1.jpg", "fase-6/unit-4.2.jpg"] }
            ],
            7: [
                { name: "Perunggu Beverly", tag: "325 Jt", val: 325000000, photos: ["fase-7/unit-1.jpg", "fase-7/unit-1.1.jpg", "fase-7/unit-1.2.jpg"] },
                { name: "Silver Beverly", tag: "410 Jt", val: 410000000, photos: ["fase-7/unit-2.jpg", "fase-7/unit-2.1.jpg", "fase-7/unit-2.2.jpg"] },
                { name: "Urban Beverly", tag: "500 Jt", val: 500000000, photos: ["fase-7/unit-3.jpg", "fase-7/unit-3.1.jpg", "fase-7/unit-3.2.jpg"] }
            ]
        };

        let activeSwipers = [];

        function renderUnits(fase) {
            const list = document.getElementById('unit-list');
            list.innerHTML = '';
            activeSwipers.forEach(s => s.destroy());
            activeSwipers = [];

            document.querySelectorAll('.phase-btn').forEach(b => b.classList.toggle('active', b.id === `btn-${fase}`));

            unitData[fase].forEach((u, i) => {
                const uid = `u-${fase}-${i}`;
                const heroSrc = u.photos[0];
                const thumbHtml = u.photos.slice(1).map(p => `
                    <div class="swiper-slide" onclick="previewImage('${uid}', '${p}')">
                        <div class="thumb-img-wrapper">
                            <img src="${p}" onerror="this.src='https://placehold.co/600x337/333/666?text=Detail'">
                        </div>
                    </div>
                `).join('');

                list.innerHTML += `
                    <div class="unit-card">
                        <div class="hero-view" id="hero-container-${uid}" onclick="resetHero('${uid}', '${heroSrc}')">
                            <img id="hero-img-${uid}" src="${heroSrc}" onerror="this.src='https://placehold.co/600x600/000/333?text=${u.name}'">
                        </div>
                        
                        <div class="card-content">
                            <h4 class="unit-title">${u.name}</h4>
                            
                            <div class="mb-8">
                                <p class="text-[9px] font-black text-[#c5a075] uppercase tracking-widest mb-4">Explore Details</p>
                                <div class="swiper" id="swiper-${uid}">
                                    <div class="swiper-wrapper">${thumbHtml}</div>
                                </div>
                            </div>

                            <div class="price-box">
                                <div>
                                    <p class="text-[9px] font-bold text-gray-400 uppercase mb-1">Price Estimation</p>
                                    <p class="font-black text-2xl text-black">Rp ${u.tag}</p>
                                </div>
                                <button onclick="setKPR(${u.val})" class="bg-black text-white px-5 py-2.5 rounded-2xl text-[10px] font-black uppercase tracking-tighter">Calc KPR</button>
                            </div>

                            <a href="https://wa.me/${WA_NUMBER}?text=Halo%20Echi,%20info%20unit%20${u.name}" target="_blank" class="btn-chat-wa">
                                <i class="fa-brands fa-whatsapp"></i><span>Chat with Consultant</span>
                            </a>
                        </div>
                    </div>
                `;
            });

            setTimeout(() => { 
                unitData[fase].forEach((u, i) => {
                    activeSwipers.push(new Swiper(`#swiper-u-${fase}-${i}`, { slidesPerView: "auto", spaceBetween: 20, loop: false }));
                }); 
            }, 100);
        }

        function previewImage(id, src) { 
            const container = document.getElementById(`hero-container-${id}`);
            const img = document.getElementById(`hero-img-${id}`);
            container.classList.add('is-wide', 'no-blend'); 
            img.style.opacity = '0';
            setTimeout(() => { img.src = src; img.style.opacity = '1'; }, 150);
        }

        function resetHero(id, src) { 
            const container = document.getElementById(`hero-container-${id}`);
            const img = document.getElementById(`hero-img-${id}`);
            container.classList.remove('is-wide', 'no-blend'); 
            img.style.opacity = '0';
            setTimeout(() => { img.src = src; img.style.opacity = '1'; }, 150);
        }

        function toggleMenu(s) { document.getElementById('mobile-menu').classList.toggle('hidden', !s); document.getElementById('mobile-menu').classList.toggle('flex', s); }
        function formatRibuan(n) { return n.toString().replace(/\B(?=(\d{3})+(?!\d))/g, "."); }
        function formatAndCalc(el) { let v = el.value.replace(/\D/g, ""); document.getElementById('kpr-raw').value = v; el.value = formatRibuan(v); calc(); }
        function calc() {
            const h = parseFloat(document.getElementById('kpr-raw').value) || 0, dp = parseFloat(document.getElementById('dp-val').value) || 0, t = parseFloat(document.getElementById('tenor-val').value) || 1;
            const p = h - (h * dp / 100), b = 0.05 / 12, m = t * 12;
            const c = (p * b) / (1 - Math.pow(1 + b, -m));
            document.getElementById('hasil-cicilan').innerText = "Rp " + formatRibuan(Math.round(c || 0));
        }
        function setKPR(v) { document.getElementById('kpr-raw').value = v; document.getElementById('kpr-disp').value = formatRibuan(v); calc(); document.getElementById('kpr').scrollIntoView({ behavior: 'smooth' }); }
        window.onload = () => { renderUnits(7); calc(); };
    </script>
</body>
</html>
