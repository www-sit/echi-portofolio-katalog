<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nefsi Asrifah | Echi - Official Property Catalog</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        
        :root {
            --gold: #a68966;
            --dark: #4a3728;
            --cream: #fdfbf7;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--cream); 
            color: var(--dark); 
            margin: 0;
            scroll-behavior: smooth;
        }

        .nav-glass { background: rgba(253, 251, 247, 0.96); backdrop-filter: blur(10px); z-index: 1000; }
        
        /* PERBAIKAN TOMBOL FASE AGAR TERLIHAT JELAS */
        .phase-btn {
            background-color: white;
            color: var(--dark);
            border: 2px solid #e5e7eb;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            min-width: 120px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }
        .phase-btn.active {
            background-color: var(--dark);
            color: white;
            border-color: var(--dark);
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        /* CONTAINER FOTO UNIT DENGAN PENGHILANG BACKGROUND HITAM */
        .unit-img-wrapper {
            background-color: #000; /* Dasar hitam untuk efek screen */
            border-radius: 2rem;
            height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            margin-bottom: 1.5rem;
            position: relative;
        }
        
        .unit-img-main {
            max-height: 100%;
            width: auto;
            object-fit: contain;
            /* Efek SCREEN: Menghilangkan latar hitam foto */
            mix-blend-mode: screen; 
            filter: contrast(1.05) brightness(1.1);
            transition: transform 0.5s ease;
        }

        .unit-card {
            background: white;
            padding: 1.25rem;
            border-radius: 2.5rem;
            box-shadow: 0 10px 30px -5px rgba(0,0,0,0.04);
            border: 1px solid rgba(0,0,0,0.02);
        }
        .unit-card:hover .unit-img-main { transform: scale(1.08); }

        /* MODAL GALERI FULLSCREEN */
        #gallery-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            z-index: 9999;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
        #gallery-overlay.active { display: flex; }

        .gallery-content {
            position: relative;
            width: 90%;
            max-width: 1000px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .gallery-img {
            max-height: 80vh;
            max-width: 100%;
            border-radius: 1.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>

    <!-- NAVIGASI -->
    <nav class="fixed w-full nav-glass px-6 py-5 border-b border-gray-100">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="font-extrabold text-xl tracking-tighter uppercase">Nefsi Asrifah | <span class="text-[#a68966]">Echi</span></div>
            <button class="md:hidden text-2xl"><i class="fas fa-bars"></i></button>
        </div>
    </nav>

    <!-- KATALOG -->
    <section class="pt-32 pb-24 px-6">
        <div class="max-w-7xl mx-auto">
            
            <!-- FILTER FASE (LOCKED & FIXED) -->
            <div class="flex gap-4 overflow-x-auto no-scrollbar pb-10 mb-8 justify-start md:justify-center">
                <button onclick="renderGallery(7)" id="btn-7" class="phase-btn px-8 py-4 rounded-2xl font-bold text-[10px] uppercase tracking-[0.2em]">Fase 7</button>
                <button onclick="renderGallery(6)" id="btn-6" class="phase-btn px-8 py-4 rounded-2xl font-bold text-[10px] uppercase tracking-[0.2em]">Fase 6</button>
                <button onclick="renderGallery(5)" id="btn-5" class="phase-btn px-8 py-4 rounded-2xl font-bold text-[10px] uppercase tracking-[0.2em]">Fase 5</button>
            </div>

            <div id="unit-container" class="grid md:grid-cols-2 lg:grid-cols-3 gap-8">
                <!-- Unit akan dirender oleh JS -->
            </div>
        </div>
    </section>

    <!-- SIMULASI KPR (LOCKED) -->
    <section id="kpr" class="py-20 px-6 bg-white rounded-[4rem] mx-4 shadow-xl border border-gray-50 mb-20">
        <div class="max-w-4xl mx-auto">
            <h3 class="text-2xl font-black text-center mb-12 uppercase tracking-widest">Simulasi KPR</h3>
            <div class="grid md:grid-cols-2 gap-12">
                <div class="space-y-8">
                    <div class="border-b-2 border-gray-100 focus-within:border-[#a68966] transition-all pb-2">
                        <label class="text-[10px] font-bold text-gray-400 uppercase mb-2 block">Harga Properti (Rp)</label>
                        <input type="text" id="kpr-disp" value="305.000.000" oninput="handleKPRInput(this)" class="w-full text-2xl font-black outline-none bg-transparent">
                        <input type="hidden" id="kpr-val" value="305000000">
                    </div>
                    <div class="flex gap-6">
                        <div class="w-1/2 border-b border-gray-100">
                            <label class="text-[10px] font-bold text-gray-400 uppercase mb-1 block">DP (%)</label>
                            <input type="number" id="kpr-dp" value="5" oninput="runKPR()" class="w-full font-bold outline-none bg-transparent">
                        </div>
                        <div class="w-1/2 border-b border-gray-100">
                            <label class="text-[10px] font-bold text-gray-400 uppercase mb-1 block">Tenor (Thn)</label>
                            <input type="number" id="kpr-t" value="20" oninput="runKPR()" class="w-full font-bold outline-none bg-transparent">
                        </div>
                    </div>
                </div>
                <div class="bg-[#fdfbf7] p-10 rounded-[2.5rem] flex flex-col justify-center text-center">
                    <span class="text-[10px] font-bold text-gray-400 uppercase mb-2">Estimasi Angsuran</span>
                    <h4 id="kpr-res" class="text-4xl font-black text-[#a68966] mb-8">Rp 1.900.000</h4>
                    <button onclick="waKPR()" class="w-full bg-[#4a3728] text-white py-4 rounded-xl font-bold text-[10px] uppercase shadow-lg">Konsultasi WhatsApp</button>
                </div>
            </div>
        </div>
    </section>

    <!-- OVERLAY GALERI (DENGAN FOTO PENDUKUNG) -->
    <div id="gallery-overlay" onclick="closeGallery()">
        <button class="absolute top-8 right-8 text-white text-3xl z-50"><i class="fas fa-times"></i></button>
        
        <div class="gallery-content" onclick="event.stopPropagation()">
            <button onclick="prevImg()" class="absolute -left-4 md:-left-12 text-white/50 hover:text-white text-4xl"><i class="fas fa-chevron-left"></i></button>
            <img id="modal-img" src="" class="gallery-img">
            <button onclick="nextImg()" class="absolute -right-4 md:-right-12 text-white/50 hover:text-white text-4xl"><i class="fas fa-chevron-right"></i></button>
        </div>

        <div id="gallery-counter" class="mt-8 text-white/60 font-bold text-[10px] uppercase tracking-[0.5em]"></div>
    </div>

    <footer class="py-12 text-center text-gray-300 text-[10px] font-bold uppercase tracking-[0.5em]">
        Nefsi Asrifah | Park Serpong Official Sales
    </footer>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        const WA_NUMBER = "628111982833";

        // --- DATA UNIT DENGAN FOTO UTAMA & PENDUKUNG ---
        const units = {
            7: [
                { 
                    name: "WONDER HOUSE 2L", 
                    priceTag: "305 Jt", 
                    priceVal: 305000000, 
                    photos: ["unit-1.jpg", "unit-1.1.jpg", "unit-1.2.jpg", "unit-1.3.jpg"] 
                },
                { 
                    name: "URBAN LIVIN", 
                    priceTag: "569 Jt", 
                    priceVal: 569000000, 
                    photos: ["unit-2.jpg", "unit-2.1.jpg", "unit-2.2.jpg", "unit-2.3.jpg"] 
                },
                { 
                    name: "WONDER HOUSE 3L", 
                    priceTag: "658 Jt", 
                    priceVal: 658000000, 
                    photos: ["unit-3.jpg", "unit-3.1.jpg", "unit-3.2.jpg", "unit-3.3.jpg"] 
                }
            ],
            6: [
                { 
                    name: "BRONZE ALPHA", 
                    priceTag: "397 Jt", 
                    priceVal: 397000000, 
                    photos: ["unit-4.jpg", "unit-4.1.jpg", "unit-4.2.jpg", "unit-4.3.jpg"] 
                }
            ],
            5: [
                { 
                    name: "SILVER UNIT", 
                    priceTag: "542 Jt", 
                    priceVal: 542000000, 
                    photos: ["unit-5.jpg", "unit-5.1.jpg", "unit-5.2.jpg", "unit-5.3.jpg"] 
                }
            ]
        };

        let currentActiveGallery = [];
        let currentIdx = 0;

        function renderGallery(phase) {
            // Update Tab Aktif
            document.querySelectorAll('.phase-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('btn-' + phase).classList.add('active');

            const grid = document.getElementById('unit-container');
            grid.innerHTML = '';

            units[phase].forEach((u, i) => {
                grid.innerHTML += `
                    <div class="unit-card" data-aos="fade-up" data-aos-delay="${i * 100}">
                        <div class="unit-img-wrapper cursor-pointer" onclick="openGallery(${phase}, ${i})">
                            <img src="${u.photos[0]}" class="unit-img-main" onerror="this.src='https://placehold.co/600x400?text=${u.name}'">
                            <div class="absolute bottom-4 right-4 bg-black/50 text-white text-[9px] px-3 py-1 rounded-full backdrop-blur-sm">
                                <i class="fas fa-images mr-1"></i> ${u.photos.length} Foto
                            </div>
                        </div>
                        <div>
                            <h4 class="text-lg font-black uppercase text-[#4a3728] mb-1">${u.name}</h4>
                            <p class="text-[9px] font-bold text-gray-400 uppercase tracking-widest mb-6">Park Serpong • Fase ${phase}</p>
                            <p class="text-3xl font-black italic text-[#4a3728] mb-8">Rp ${u.priceTag}</p>
                            <div class="flex gap-3">
                                <button onclick="selectKPR(${u.priceVal})" class="flex-1 py-4 border-2 border-gray-100 rounded-2xl font-bold text-[10px] uppercase hover:bg-gray-50">Simulasi KPR</button>
                                <button onclick="waDirect('${u.name}')" class="flex-1 py-4 bg-[#a68966] text-white rounded-2xl font-bold text-[10px] uppercase shadow-lg">Chat Echi</button>
                            </div>
                        </div>
                    </div>
                `;
            });
            AOS.refresh();
        }

        // FUNGSI GALERI BERLAPIS
        function openGallery(phase, unitIdx) {
            currentActiveGallery = units[phase][unitIdx].photos;
            currentIdx = 0;
            showImage();
            document.getElementById('gallery-overlay').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeGallery() {
            document.getElementById('gallery-overlay').classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        function showImage() {
            const img = document.getElementById('modal-img');
            img.src = currentActiveGallery[currentIdx];
            document.getElementById('gallery-counter').innerText = `Gambar ${currentIdx + 1} / ${currentActiveGallery.length}`;
        }

        function nextImg() { currentIdx = (currentIdx + 1) % currentActiveGallery.length; showImage(); }
        function prevImg() { currentIdx = (currentIdx - 1 + currentActiveGallery.length) % currentActiveGallery.length; showImage(); }

        // FUNGSI KPR (LOCKED LOGIC)
        function formatIDR(n) { return n.toString().replace(/\B(?=(\d{3})+(?!\d))/g, "."); }

        function handleKPRInput(el) {
            let v = el.value.replace(/\D/g, "");
            document.getElementById('kpr-val').value = v;
            el.value = formatIDR(v);
            runKPR();
        }

        function runKPR() {
            const h = parseFloat(document.getElementById('kpr-val').value) || 0;
            const d = parseFloat(document.getElementById('kpr-dp').value) || 0;
            const t = parseFloat(document.getElementById('kpr-t').value) || 0;
            const p = h * (1 - (d/100));
            const r = 0.05 / 12;
            const n = t * 12;
            const res = n > 0 ? (p * r) / (1 - Math.pow(1 + r, -n)) : 0;
            document.getElementById('kpr-res').innerText = "Rp " + formatIDR(Math.round(res));
        }

        function selectKPR(v) {
            document.getElementById('kpr-val').value = v;
            document.getElementById('kpr-disp').value = formatIDR(v);
            runKPR();
            document.getElementById('kpr').scrollIntoView({behavior: 'smooth'});
        }

        function waDirect(name) {
            const m = encodeURIComponent(`Halo Kak Echi, saya mau tanya detail unit ${name} di Park Serpong.`);
            window.open(`https://wa.me/${WA_NUMBER}?text=${m}`, '_blank');
        }

        function waKPR() {
            const h = document.getElementById('kpr-disp').value;
            const r = document.getElementById('kpr-res').innerText;
            const m = encodeURIComponent(`Halo Kak Echi, saya simulasi KPR seharga Rp ${h} dengan cicilan ${r}.`);
            window.open(`https://wa.me/${WA_NUMBER}?text=${m}`, '_blank');
        }

        window.onload = () => {
            AOS.init({ duration: 800, once: true });
            renderGallery(7); // Default buka fase 7
        }
    </script>
</body>
</html>
