<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nefsi Asrifah | Echi - Official Property Catalog</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <!-- AOS Library -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #fdfbf7; 
            color: #4a3728; 
            margin: 0;
            padding: 0;
            scroll-behavior: smooth;
        }

        .nav-glass { background: rgba(253, 251, 247, 0.95); backdrop-filter: blur(10px); }
        .btn-gold { background: #a68966; color: white; transition: 0.3s; }
        .btn-gold:hover { background: #8e7352; transform: translateY(-2px); }
        .phase-btn.active { background-color: #4a3728 !important; color: white !important; }
        
        .unit-card { 
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1); 
            border-radius: 2.5rem; 
            overflow: hidden; 
            background: white; 
            border: 1px solid #f1f1f1; 
        }
        
        #gallery-modal {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 999;
            background: rgba(0, 0, 0, 0.95);
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        #gallery-modal.active { display: flex; }
        
        .kpr-input { border-bottom: 2px solid #f1f1f1; transition: 0.3s; }
        .kpr-input:focus-within { border-color: #a68966; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* Mencegah layar putih saat AOS belum load */
        [data-aos] { opacity: 0; transition-property: transform, opacity; }
        [data-aos].aos-animate { opacity: 1; }
    </style>
</head>
<body>

    <!-- NAVBAR -->
    <nav class="fixed w-full z-[100] nav-glass px-6 py-4 border-b border-gray-100">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="font-extrabold text-lg tracking-tighter uppercase">Nefsi Asrifah | Echi</div>
            <div class="hidden md:flex gap-8 text-[10px] font-bold uppercase tracking-widest">
                <a href="#home" class="hover:text-[#a68966]">Beranda</a>
                <a href="#katalog" class="hover:text-[#a68966]">Katalog</a>
                <a href="#kpr" class="hover:text-[#a68966]">KPR</a>
            </div>
            <button onclick="toggleMenu()" class="md:hidden text-2xl"><i class="fas fa-bars"></i></button>
        </div>
        <div id="mobile-menu" class="hidden absolute top-full left-0 w-full bg-white p-6 flex flex-col gap-4 shadow-xl">
            <a href="#home" onclick="toggleMenu()" class="font-bold text-[10px] uppercase">Beranda</a>
            <a href="#katalog" onclick="toggleMenu()" class="font-bold text-[10px] uppercase">Katalog</a>
            <a href="#kpr" onclick="toggleMenu()" class="font-bold text-[10px] uppercase">KPR</a>
        </div>
    </nav>

    <!-- HERO -->
    <section id="home" class="min-h-screen flex items-center px-6 pt-24 pb-12">
        <div class="max-w-7xl mx-auto grid lg:grid-cols-2 gap-12 items-center w-full">
            <div data-aos="fade-right">
                <span class="text-[10px] font-extrabold text-[#a68966] uppercase tracking-[0.4em] mb-4 block">Sales Inhouse Lippoland</span>
                <h1 class="text-5xl lg:text-7xl font-black leading-tight mb-4 text-[#4a3828]">Nefsi Asrifah | <span class="text-[#a68966]">Echi</span></h1>
                <h2 class="text-xl font-bold text-gray-400 mb-8 uppercase">Property Consultant</h2>
                <p class="text-gray-600 border-l-4 border-[#a68966] pl-6 mb-10 text-lg font-medium italic">
                    "Menghadirkan solusi dan nilai investasi terbaik untuk setiap klien."
                </p>
                <a href="#katalog" class="btn-gold px-10 py-5 rounded-2xl font-bold text-[11px] uppercase tracking-widest inline-block">Lihat Katalog</a>
            </div>
            <div data-aos="fade-left" class="relative">
                <div class="bg-white p-4 rounded-[3.5rem] shadow-2xl relative z-10">
                    <img src="wajah.jpg" class="rounded-[3rem] w-full h-[500px] object-cover" onerror="this.src='https://placehold.co/600x800?text=Echi+Profile'">
                    <div class="flex justify-center gap-6 py-6">
                        <a href="https://wa.me/628111982833" class="text-2xl text-green-500"><i class="fab fa-whatsapp"></i></a>
                        <a href="https://www.instagram.com/echiproperti" class="text-2xl text-[#a68966]"><i class="fab fa-instagram"></i></a>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- KATALOG -->
    <section id="katalog" class="py-24 px-6 bg-white">
        <div class="max-w-7xl mx-auto">
            <div class="text-center mb-16">
                <h2 class="text-3xl font-black uppercase tracking-widest mb-4">Unit Park Serpong</h2>
                <div class="w-20 h-1 bg-[#a68966] mx-auto"></div>
            </div>

            <div class="mb-12 flex justify-center gap-3 overflow-x-auto pb-4 no-scrollbar">
                <button onclick="filterPhase(7)" id="btn-7" class="phase-btn active px-8 py-3 rounded-xl font-bold text-[10px] uppercase bg-gray-100">Fase 7</button>
                <button onclick="filterPhase(6)" id="btn-6" class="phase-btn px-8 py-3 rounded-xl font-bold text-[10px] uppercase bg-gray-100">Fase 6</button>
                <button onclick="filterPhase(5)" id="btn-5" class="phase-btn px-8 py-3 rounded-xl font-bold text-[10px] uppercase bg-gray-100">Fase 5</button>
            </div>

            <div id="unit-container" class="grid md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
        </div>
    </section>

    <!-- SIMULASI KPR -->
    <section id="kpr" class="py-24 px-6 bg-[#fdfbf7]">
        <div class="max-w-4xl mx-auto">
            <div class="bg-white p-10 rounded-[3rem] shadow-xl border border-gray-100">
                <h3 class="text-2xl font-black text-center mb-10 uppercase tracking-widest">Simulasi KPR</h3>
                <div class="grid md:grid-cols-2 gap-12">
                    <div class="space-y-6">
                        <div class="kpr-input pb-2">
                            <label class="text-[9px] font-bold text-gray-400 uppercase mb-1 block">Harga Properti</label>
                            <input type="text" id="harga-display" value="305.000.000" oninput="handleHargaInput(this)" class="w-full text-xl font-bold outline-none">
                            <input type="hidden" id="harga-unit" value="305000000">
                        </div>
                        <div class="flex gap-4">
                            <div class="w-1/2 kpr-input pb-2">
                                <label class="text-[9px] font-bold text-gray-400 uppercase mb-1 block">DP (%)</label>
                                <input type="number" id="dp-percent" value="5" oninput="hitungKPR()" class="w-full text-lg font-bold outline-none">
                            </div>
                            <div class="w-1/2 kpr-input pb-2">
                                <label class="text-[9px] font-bold text-gray-400 uppercase mb-1 block">Tenor (Thn)</label>
                                <input type="number" id="tenor" value="20" oninput="hitungKPR()" class="w-full text-lg font-bold outline-none">
                            </div>
                        </div>
                    </div>
                    <div class="flex flex-col justify-center items-center md:items-start">
                        <p class="text-[10px] font-bold text-gray-400 uppercase mb-2">Estimasi Cicilan</p>
                        <h4 id="hasil-cicilan" class="text-4xl font-black text-[#a68966]">Rp 1.900.000</h4>
                        <p class="text-[9px] mt-2 text-gray-400 italic text-center md:text-left">*Asumsi bunga 5% pa</p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- MODAL GALLERY -->
    <div id="gallery-modal" onclick="closeGallery()">
        <div class="relative w-full max-w-4xl p-4" onclick="event.stopPropagation()">
            <img id="modal-img" src="" class="w-full h-[400px] md:h-[600px] object-cover rounded-3xl shadow-2xl">
            <button onclick="prevPhoto()" class="absolute left-8 top-1/2 -translate-y-1/2 text-white text-3xl"><i class="fas fa-chevron-left"></i></button>
            <button onclick="nextPhoto()" class="absolute right-8 top-1/2 -translate-y-1/2 text-white text-3xl"><i class="fas fa-chevron-right"></i></button>
            <button onclick="closeGallery()" class="absolute -top-10 right-4 text-white text-2xl"><i class="fas fa-times"></i></button>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        const unitData = {
            7: [
                { name: "Wonder House 2 Lantai", price: "305 Jt", val: 305000000, photos: ["fase-7/unit-1.jpg", "fase-7/unit-1.1.jpg", "fase-7/unit-1.2.jpg", "fase-7/unit-1.3.jpg"] },
                { name: "Urban Livin", price: "569 Jt", val: 569000000, photos: ["fase-7/unit-2.jpg", "fase-7/unit-2.1.jpg", "fase-7/unit-2.2.jpg", "fase-7/unit-2.3.jpg"] },
                { name: "Wonder House 3 Lantai", price: "658 Jt", val: 658000000, photos: ["fase-7/unit-3.jpg", "fase-7/unit-3.1.jpg", "fase-7/unit-3.2.jpg", "fase-7/unit-3.3.jpg"] },
                { name: "Gold Tops Livin", price: "901 Jt", val: 901000000, photos: ["fase-7/unit-4.jpg", "fase-7/unit-4.1.jpg", "fase-7/unit-4.2.jpg", "fase-7/unit-4.3.jpg"] }
            ],
            6: [
                { name: "Bronze Alpha Livin", price: "397 Jt", val: 397000000, photos: ["fase-6/unit-1.jpg", "fase-6/unit-1.1.jpg", "fase-6/unit-1.2.jpg", "fase-6/unit-1.3.jpg"] },
                { name: "Silver Alpha Livin", price: "534 Jt", val: 534000000, photos: ["fase-6/unit-2.jpg", "fase-6/unit-2.1.jpg", "fase-6/unit-2.2.jpg", "fase-6/unit-2.3.jpg"] },
                { name: "Treetops Alpha", price: "655 Jt", val: 655000000, photos: ["fase-6/unit-3.jpg", "fase-6/unit-3.1.jpg", "fase-6/unit-3.2.jpg", "fase-6/unit-3.3.jpg"] },
                { name: "Gold Alpha Livin", price: "817 Jt", val: 817000000, photos: ["fase-6/unit-4.jpg", "fase-6/unit-4.1.jpg", "fase-6/unit-4.2.jpg", "fase-6/unit-4.3.jpg"] },
                { name: "Gold Tops Alpha", price: "897 Jt", val: 897000000, photos: ["fase-6/unit-5.jpg", "fase-6/unit-5.1.jpg", "fase-6/unit-5.2.jpg", "fase-6/unit-5.3.jpg"] },
                { name: "Cendana Alpha Livin", price: "1 Milyar", val: 1000000000, photos: ["fase-6/unit-6.jpg", "fase-6/unit-6.1.jpg", "fase-6/unit-6.2.jpg", "fase-6/unit-6.3.jpg"] }
            ],
            5: [
                { name: "Bronze Unit 1", price: "393 Jt", val: 393000000, photos: ["fase-5/unit-1.jpg", "fase-5/unit-1.1.jpg", "fase-5/unit-1.2.jpg", "fase-5/unit-1.3.jpg"] },
                { name: "Bronze Unit 2", price: "419 Jt", val: 419000000, photos: ["fase-5/unit-2.jpg", "fase-5/unit-2.1.jpg", "fase-5/unit-2.2.jpg", "fase-5/unit-2.3.jpg"] },
                { name: "Silver Livin", price: "542 Jt", val: 542000000, photos: ["fase-5/unit-3.jpg", "fase-5/unit-3.1.jpg", "fase-5/unit-3.2.jpg", "fase-5/unit-3.3.jpg"] },
                { name: "Treetops Livin", price: "629 Jt", val: 629000000, photos: ["fase-5/unit-4.jpg", "fase-5/unit-4.1.jpg", "fase-5/unit-4.2.jpg", "fase-5/unit-4.3.jpg"] },
                { name: "Gold Livin", price: "774 Jt", val: 774000000, photos: ["fase-5/unit-5.jpg", "fase-5/unit-5.1.jpg", "fase-5/unit-5.2.jpg", "fase-5/unit-5.3.jpg"] }
            ]
        };

        let currentGallery = [];
        let galleryIdx = 0;

        function toggleMenu() { document.getElementById('mobile-menu').classList.toggle('hidden'); }

        function filterPhase(p) {
            document.querySelectorAll('.phase-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-'+p).classList.add('active');
            const container = document.getElementById('unit-container');
            container.innerHTML = '';

            unitData[p].forEach((u, i) => {
                container.innerHTML += `
                    <div class="unit-card" data-aos="fade-up">
                        <img src="${u.photos[0]}" class="w-full h-56 object-cover cursor-pointer" onclick="openGallery(${p}, ${i})" onerror="this.src='https://placehold.co/500x300?text=${u.name}'">
                        <div class="p-6">
                            <h4 class="font-extrabold uppercase text-lg">${u.name}</h4>
                            <p class="text-[10px] text-gray-400 font-bold mb-4 uppercase tracking-widest">Mulai Dari</p>
                            <p class="text-2xl font-black text-[#a68966] mb-6 italic">Rp ${u.price}</p>
                            <div class="flex gap-2">
                                <button onclick="selectKPR(${u.val})" class="flex-1 py-3 bg-gray-50 rounded-xl text-[9px] font-bold uppercase border">Hitung KPR</button>
                                <a href="https://wa.me/628111982833" class="flex-1 py-3 bg-[#a68966] text-white rounded-xl text-[9px] font-bold uppercase text-center">Hubungi Echi</a>
                            </div>
                        </div>
                    </div>
                `;
            });
            if(window.AOS) AOS.refresh();
        }

        function formatNumber(n) { return n.toString().replace(/\B(?=(\d{3})+(?!\d))/g, "."); }
        function handleHargaInput(e) {
            let v = e.value.replace(/\D/g, "");
            document.getElementById('harga-unit').value = v;
            e.value = formatNumber(v);
            hitungKPR();
        }

        function hitungKPR() {
            const h = parseFloat(document.getElementById('harga-unit').value) || 0;
            const d = parseFloat(document.getElementById('dp-percent').value) || 0;
            const t = parseFloat(document.getElementById('tenor').value) || 0;
            const pinj = h * (1 - (d/100));
            const bung = 0.05 / 12;
            const n = t * 12;
            const cicil = n > 0 ? (pinj * bung) / (1 - Math.pow(1 + bung, -n)) : 0;
            document.getElementById('hasil-cicilan').innerText = "Rp " + formatNumber(Math.round(cicil));
        }

        function selectKPR(v) {
            document.getElementById('harga-unit').value = v;
            document.getElementById('harga-display').value = formatNumber(v);
            hitungKPR();
            document.getElementById('kpr').scrollIntoView({behavior:'smooth'});
        }

        function openGallery(p, i) {
            currentGallery = unitData[p][i].photos;
            galleryIdx = 0;
            document.getElementById('modal-img').src = currentGallery[0];
            document.getElementById('gallery-modal').classList.add('active');
        }

        function closeGallery() { document.getElementById('gallery-modal').classList.remove('active'); }
        function nextPhoto() { galleryIdx = (galleryIdx + 1) % currentGallery.length; document.getElementById('modal-img').src = currentGallery[galleryIdx]; }
        function prevPhoto() { galleryIdx = (galleryIdx - 1 + currentGallery.length) % currentGallery.length; document.getElementById('modal-img').src = currentGallery[galleryIdx]; }

        window.onload = () => {
            AOS.init({ duration: 800, once: true });
            filterPhase(7);
            hitungKPR();
        }
    </script>
</body>
</html>
