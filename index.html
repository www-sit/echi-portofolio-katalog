<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nefsi Asrifah | Echi - Property Consultant</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap');
        
        :root {
            --gold: #a68966;
            --dark: #2d241d;
            --cream-light: #fdfcf9;
            --champagne: #f0ebe3;
        }

        html { scroll-behavior: smooth; }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #f8f5f0; 
            color: var(--dark); 
            margin: 0;
            overflow-x: hidden;
        }

        /* --- NAVIGATION --- */
        .nav-glass { background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(10px); z-index: 1000; border-bottom: 1px solid #f0f0f0; }
        #mobile-menu {
            position: fixed; top: 0; right: -100%; width: 85%; height: 100%;
            background: white; z-index: 2000; transition: 0.5s cubic-bezier(0.19, 1, 0.22, 1);
            padding: 40px; box-shadow: -10px 0 30px rgba(0,0,0,0.05); display: flex; flex-direction: column;
        }
        #mobile-menu.active { right: 0; }
        .menu-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 1500; display: none; }

        /* --- DRAGGABLE PROFILE --- */
        #profile-section { width: 100%; max-width: 1000px; margin: 0 auto; position: relative; touch-action: none; cursor: grab; }
        .profile-container {
            transition: all 0.7s cubic-bezier(0.19, 1, 0.22, 1);
            display: flex; flex-direction: column; align-items: center; text-align: center;
            padding: 120px 20px 50px; width: 100%; background: var(--cream-light); border-bottom: 1px solid var(--champagne);
        }

        .profile-image-wrapper {
            width: 135px; height: 135px; border-radius: 50%; overflow: hidden; border: 4px solid white;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); transition: all 0.7s cubic-bezier(0.19, 1, 0.22, 1);
            margin-bottom: 20px; flex-shrink: 0; position: relative;
        }

        .drag-arrow { position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%); color: var(--gold); font-size: 16px; animation: bounce 2s infinite; z-index: 10; }
        .btn-reset-profile {
            position: absolute; top: 110px; right: 20px; width: 40px; height: 40px;
            background: var(--dark); border-radius: 50%; display: none; align-items: center; justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); color: white; z-index: 100; cursor: pointer;
        }
        .is-transformed .btn-reset-profile { display: flex; }

        .is-transformed .profile-container { flex-direction: row; text-align: left; padding: 115px 25px 30px; }
        .is-transformed .profile-image-wrapper { width: 80px; height: 80px; border-radius: 18px; margin-bottom: 0; margin-right: 20px; }
        .is-transformed .drag-arrow { display: none; }
        .is-transformed .sosmed-list { justify-content: flex-start; margin-top: 10px; }
        .is-transformed .quick-tabs { justify-content: flex-start; }

        /* --- UNIT CARD (MENYATU) --- */
        .unit-card { background: var(--cream-light); border-radius: 2.2rem; overflow: hidden; border: 1px solid var(--champagne); display: flex; flex-direction: column; }
        
        /* Foto Utama 1:1 Menyatu */
        .hero-view { width: 100%; aspect-ratio: 1/1; overflow: hidden; position: relative; background: #eee; }
        .hero-view img { width: 100%; height: 100%; object-fit: cover; }
        
        /* Mode Detail 16:9 saat klik foto kecil */
        .hero-view.is-detail { aspect-ratio: 16/9; transition: 0.5s cubic-bezier(0.19, 1, 0.22, 1); }
        .hero-view.is-detail img { object-fit: cover; }

        .btn-back-photo { position: absolute; top: 15px; right: 15px; background: rgba(255,255,255,0.9); width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; opacity: 0; z-index: 10; color: var(--dark); }
        .hero-view.is-detail .btn-back-photo { opacity: 1; }

        /* Foto Pendukung 16:9 */
        .photo-strip { padding: 15px; background: white; border-bottom: 1px solid #f0f0f0; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .static-photo-wrapper { width: 100%; aspect-ratio: 16/9; border-radius: 1rem; overflow: hidden; cursor: pointer; border: 1px solid #eee; }
        .swiper-container-custom { width: 100%; aspect-ratio: 16/9; border-radius: 1rem; overflow: hidden; border: 1px solid #eee; }

        .phase-btn { padding: 12px 28px; border-radius: 14px; font-size: 11px; font-weight: 800; border: 1px solid #eee; background: white; transition: 0.3s; }
        .phase-btn.active { background: var(--dark); color: white !important; }

        .tab-btn { padding: 12px 22px; background: white; border-radius: 50px; font-size: 10px; font-weight: 800; border: 1px solid #eee; display: flex; align-items: center; gap: 8px; }
        
        .reveal { opacity: 0; transform: translateY(20px); transition: 0.6s ease-out; }
        .reveal.active { opacity: 1; transform: translateY(0); }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <div class="menu-overlay" id="overlay" onclick="toggleMenu(false)"></div>
    <div id="mobile-menu">
        <div class="flex justify-between items-center mb-10">
            <span class="font-black text-[10px] uppercase tracking-[0.3em] text-gray-400">Navigation</span>
            <button onclick="toggleMenu(false)"><i class="fa-solid fa-xmark text-2xl"></i></button>
        </div>
        <div class="flex flex-col gap-8 font-black text-2xl uppercase tracking-tighter flex-grow">
            <a href="#top" onclick="toggleMenu(false)">Home</a>
            <a href="#katalog" onclick="toggleMenu(false)">Unit Catalog</a>
            <a href="#kpr" onclick="toggleMenu(false)">Simulasi KPR</a>
        </div>
        <div class="flex gap-6 mt-auto pt-10 border-t border-gray-100">
            <a href="https://wa.me/628119001899" target="_blank" class="text-2xl"><i class="fa-brands fa-whatsapp"></i></a>
            <a href="https://www.instagram.com/lippokarawaci.id" target="_blank" class="text-2xl"><i class="fa-brands fa-instagram"></i></a>
            <a href="https://www.tiktok.com/@parkserponghomes" target="_blank" class="text-2xl"><i class="fa-brands fa-tiktok"></i></a>
        </div>
    </div>

    <nav class="fixed top-0 w-full nav-glass px-6 py-5 flex justify-between items-center">
        <div class="font-extrabold text-sm tracking-tighter uppercase">NEFSI ASRIFAH <span class="text-[#a68966]">| ECHI</span></div>
        <button onclick="toggleMenu(true)"><i class="fa-solid fa-bars-staggered text-2xl"></i></button>
    </nav>

    <header id="top">
        <div id="profile-section">
            <div class="btn-reset-profile" onclick="resetProfile()"><i class="fa-solid fa-rotate-left"></i></div>
            <div class="profile-container">
                <div class="profile-image-wrapper">
                    <img src="wajah.jpg" class="w-full h-full object-cover" onerror="this.src='https://placehold.co/400x400?text=Echi'">
                    <i class="fa-solid fa-chevron-down drag-arrow"></i>
                </div>
                <div class="profile-text-content">
                    <span class="text-[9px] font-bold text-[#a68966] uppercase tracking-[0.3em] mb-1 block">Property Consultant</span>
                    <h1 class="text-3xl font-black tracking-tighter mb-1 uppercase">Estate by Echi</h1>
                    <p class="profile-desc text-gray-500 text-[11px] max-w-[300px] leading-relaxed">Pilihan hunian cerdas dan modern di Park Serpong.</p>
                    
                    <div class="sosmed-list flex gap-6 mt-4 justify-center">
                        <a href="https://wa.me/628119001899" target="_blank" class="text-xl text-gray-700 hover:text-[#a68966]"><i class="fa-brands fa-whatsapp"></i></a>
                        <a href="https://www.instagram.com/lippokarawaci.id" target="_blank" class="text-xl text-gray-700 hover:text-[#a68966]"><i class="fa-brands fa-instagram"></i></a>
                        <a href="https://www.tiktok.com/@parkserponghomes" target="_blank" class="text-xl text-gray-700 hover:text-[#a68966]"><i class="fa-brands fa-tiktok"></i></a>
                    </div>

                    <div class="quick-tabs">
                        <a href="#katalog" class="tab-btn"><i class="fa-solid fa-house"></i> Unit</a>
                        <a href="#kpr" class="tab-btn"><i class="fa-solid fa-calculator"></i> KPR</a>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <section id="katalog" class="py-12 px-6">
        <div class="max-w-6xl mx-auto">
            <h2 class="text-center font-black text-2xl uppercase tracking-tighter mb-10">Unit Park Serpong</h2>
            <div class="flex gap-3 overflow-x-auto no-scrollbar mb-10 justify-center">
                <button onclick="renderUnits(7)" id="btn-7" class="phase-btn active">FASE 07</button>
                <button onclick="renderUnits(6)" id="btn-6" class="phase-btn">FASE 06</button>
                <button onclick="renderUnits(5)" id="btn-5" class="phase-btn">FASE 05</button>
            </div>
            <div id="unit-list" class="grid md:grid-cols-2 gap-10"></div>
        </div>
    </section>

    <section id="kpr" class="py-20 px-6 bg-white border-t reveal">
        <div class="max-w-4xl mx-auto text-center">
            <h3 class="font-black uppercase text-[#a68966] mb-12 text-[10px] tracking-[0.3em]">Simulasi Angsuran</h3>
            <div class="grid md:grid-cols-2 gap-10 text-left">
                <div class="bg-[#fdfcf9] p-8 rounded-[2rem] border border-[#f0ebe3]">
                    <label class="text-[9px] font-bold text-gray-400 block mb-3">HARGA PROPERTI</label>
                    <div class="flex items-center">
                        <span class="text-gray-300 font-bold mr-3 text-2xl">Rp</span>
                        <input type="text" id="kpr-disp" value="325.000.000" oninput="formatAndCalc(this)" class="w-full bg-transparent border-none outline-none text-3xl font-black">
                    </div>
                    <input type="hidden" id="kpr-raw" value="325000000">
                </div>
                <div class="bg-[#2d241d] p-10 rounded-[3rem] text-center text-white">
                    <p class="text-[10px] font-bold text-gray-400 uppercase mb-4">Estimasi / Bulan</p>
                    <span id="hasil-cicilan" class="text-4xl font-black block mb-10">Rp 2.050.000</span>
                    <button onclick="sendToWA()" class="w-full py-5 bg-[#a68966] rounded-2xl font-black text-[11px] uppercase tracking-widest active:scale-95 transition">Konsultasi WA</button>
                </div>
            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        const WA_NUMBER = "628119001899";
        let selectedUnitName = "General Park Serpong";

        // --- PROFILE DRAG ---
        const profileSect = document.getElementById('profile-section');
        const container = document.querySelector('.profile-container');
        let startY = 0, isDragging = false;
        profileSect.addEventListener('pointerdown', (e) => { if(!document.body.classList.contains('is-transformed')) { isDragging = true; startY = e.clientY; profileSect.setPointerCapture(e.pointerId); } });
        profileSect.addEventListener('pointermove', (e) => { if(isDragging) { let distY = e.clientY - startY; if(distY > 0) container.style.transform = `translateY(${distY * 0.3}px)`; } });
        profileSect.addEventListener('pointerup', (e) => { if(isDragging) { isDragging = false; if(e.clientY - startY > 80) document.body.classList.add('is-transformed'); container.style.transform = ''; } });
        function resetProfile() { document.body.classList.remove('is-transformed'); }

        // --- DATA UNIT LENGKAP ---
        const unitData = {
            7: [
                { name: "Perunggu Beverly Livin", tag: "325 Jt", val: 325000000, desc: "Modern Beverly Hills Serpong.", bed: 2, bath: 1, floor: 1, photos: ["unit-1.jpg", "unit-1.1.jpg", "unit-1.2.jpg"] },
                { name: "Silver Beverly Livin", tag: "410 Jt", val: 410000000, desc: "Mewah untuk keluarga muda.", bed: 2, bath: 2, floor: 2, photos: ["unit-2.jpg", "unit-2.1.jpg", "unit-2.2.jpg"] },
                { name: "Gold Beverly Livin", tag: "610 Jt", val: 610000000, desc: "Simbol kemewahan sejati.", bed: 3, bath: 3, floor: 2, photos: ["unit-5.jpg", "unit-5.1.jpg", "unit-5.2.jpg"] }
            ],
            6: [
                { name: "Perunggu Livin Tipe B", tag: "315 Jt", val: 315000000, desc: "Hunian compact fungsional.", bed: 2, bath: 1, floor: 1, photos: ["unit-1.jpg", "unit-1.1.jpg"] },
                { name: "Quartz Livin Tipe Q", tag: "460 Jt", val: 460000000, desc: "Elegan minimalis masa depan.", bed: 2, bath: 2, floor: 2, photos: ["unit-2.jpg", "unit-2.1.jpg"] },
                { name: "GoldTops Livin Type GT", tag: "670 Jt", val: 670000000, desc: "Fasad menawan fase 06.", bed: 4, bath: 4, floor: 2, photos: ["unit-5.jpg", "unit-5.1.jpg"] }
            ],
            5: [
                { name: "Perunggu Livin Tipe B", tag: "305 Jt", val: 305000000, desc: "Kualitas premium harga terjangkau.", bed: 2, bath: 1, floor: 1, photos: ["unit-1.jpg", "unit-1.1.jpg"] },
                { name: "Silver Livin Tipe S", tag: "490 Jt", val: 490000000, desc: "Hunian ideal keluarga harmonis.", bed: 3, bath: 2, floor: 2, photos: ["unit-2.jpg", "unit-2.1.jpg"] },
                { name: "Quartz Livin Tipe Q", tag: "450 Jt", val: 450000000, desc: "Modernitas dalam ketenangan.", bed: 2, bath: 2, floor: 2, photos: ["unit-3.jpg", "unit-3.1.jpg"] },
                { name: "Gold Livin Tipe G", tag: "580 Jt", val: 580000000, desc: "Ruang luas untuk kenyamanan ekstra.", bed: 3, bath: 3, floor: 2, photos: ["unit-4.jpg", "unit-4.1.jpg"] },
                { name: "GoldTops Livin Type GT", tag: "650 Jt", val: 650000000, desc: "Puncak estetika hunian modern.", bed: 4, bath: 3, floor: 2, photos: ["unit-6.jpg", "unit-6.1.jpg"] }
            ]
        };

        function renderUnits(fase) {
            const list = document.getElementById('unit-list'); list.innerHTML = '';
            document.querySelectorAll('.phase-btn').forEach(b => b.classList.toggle('active', b.id === `btn-${fase}`));
            
            unitData[fase].forEach((u, i) => {
                const uid = `u-${fase}-${i}`; const mainImg = `fase-${fase}/` + u.photos[0];
                const slides = u.photos.slice(1).map(p => `<div class="swiper-slide" onclick="showDetailPhoto('${uid}', 'fase-${fase}/${p}')"><img src="fase-${fase}/${p}" class="w-full h-full object-cover"></div>`).join('');
                
                list.innerHTML += `
                    <div class="unit-card reveal active">
                        <div class="hero-view" id="hero-${uid}">
                            <button class="btn-back-photo" onclick="resetToMain('${uid}', '${mainImg}')"><i class="fa-solid fa-camera-rotate"></i></button>
                            <img src="${mainImg}">
                        </div>
                        
                        <div class="photo-strip">
                            <div class="static-photo-wrapper" onclick="resetToMain('${uid}', '${mainImg}')"><img src="${mainImg}" class="w-full h-full object-cover"></div>
                            <div class="swiper swiper-container-custom" id="sw-${uid}"><div class="swiper-wrapper">${slides}</div></div>
                        </div>

                        <div class="p-8 flex-grow flex flex-col">
                            <h4 class="font-black text-xl uppercase mb-2">${u.name}</h4>
                            <p class="text-[10px] text-gray-500 mb-6">${u.desc}</p>
                            <div class="flex gap-4 mb-8 text-[10px] font-bold text-gray-400 border-b border-gray-100 pb-6">
                                <span><i class="fa-solid fa-bed text-[#a68966]"></i> ${u.bed} BR</span>
                                <span><i class="fa-solid fa-bath text-[#a68966]"></i> ${u.bath} BA</span>
                                <span><i class="fa-solid fa-layer-group text-[#a68966]"></i> ${u.floor} Lantai</span>
                            </div>
                            <div class="mt-auto grid grid-cols-2 gap-4">
                                <button onclick="setKPR('${u.name}', ${u.val})" class="py-4 border rounded-2xl text-[10px] font-black uppercase tracking-widest">Simulasi</button>
                                <a href="https://wa.me/${WA_NUMBER}?text=Halo Echi, info unit ${u.name}" target="_blank" class="bg-[#2d241d] text-white flex items-center justify-center rounded-2xl text-[10px] font-black uppercase">Chat WA</a>
                            </div>
                        </div>
                    </div>`;
            });
            setTimeout(() => { unitData[fase].forEach((u, i) => { new Swiper(`#sw-u-${fase}-${i}`, { loop: true, autoplay: { delay: 3500 } }); }); }, 200);
        }

        // --- UTILS ---
        function showDetailPhoto(uid, src) { const hero = document.getElementById(`hero-${uid}`); hero.classList.add('is-detail'); hero.querySelector('img').src = src; }
        function resetToMain(uid, src) { const hero = document.getElementById(`hero-${uid}`); hero.classList.remove('is-detail'); hero.querySelector('img').src = src; }
        function formatRibuan(n) { return n.toString().replace(/\B(?=(\d{3})+(?!\d))/g, "."); }
        function formatAndCalc(el) { let v = el.value.replace(/\D/g, ""); document.getElementById('kpr-raw').value = v; el.value = formatRibuan(v); calc(); }
        function calc() {
            const h = parseFloat(document.getElementById('kpr-raw').value) || 0; const p = h - (h * 0.05); const r = 0.055 / 12; const n = 240;
            const c = (p * r) / (1 - Math.pow(1 + r, -n));
            document.getElementById('hasil-cicilan').innerText = "Rp " + formatRibuan(Math.round(c || 0));
        }
        function setKPR(name, v) { selectedUnitName = name; document.getElementById('kpr-raw').value = v; document.getElementById('kpr-disp').value = formatRibuan(v); calc(); document.getElementById('kpr').scrollIntoView({ behavior: 'smooth' }); }
        function toggleMenu(s) { document.getElementById('mobile-menu').classList.toggle('active', s); document.getElementById('overlay').style.display = s ? 'block' : 'none'; }
        function sendToWA() {
            const harga = document.getElementById('kpr-disp').value; const cicilan = document.getElementById('hasil-cicilan').innerText;
            const text = `Halo Echi, tertarik *${selectedUnitName}* harga Rp ${harga}. Cicilan ${cicilan}.`;
            window.open(`https://wa.me/${WA_NUMBER}?text=${encodeURIComponent(text)}`, '_blank');
        }

        // --- REVEAL ON SCROLL ---
        window.addEventListener('scroll', () => {
            document.querySelectorAll('.reveal').forEach(el => {
                if(el.getBoundingClientRect().top < window.innerHeight - 50) el.classList.add('active');
            });
        });

        window.onload = () => { renderUnits(7); calc(); };
    </script>
</body>
</html>
