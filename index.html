<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nefsi Asrifah | Echi - Property Consultant</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap');
        
        :root {
            --gold: #a68966;
            --dark: #2d241d;
            --cream-light: #fdfcf9;
            --champagne: #f0ebe3;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #f8f5f0; 
            color: var(--dark); 
            margin: 0;
            overflow-x: hidden;
            touch-action: pan-y;
        }

        .nav-glass { 
            background: rgba(255, 255, 255, 0.98); 
            backdrop-filter: blur(10px); 
            z-index: 1000; 
            border-bottom: 1px solid #f0f0f0;
        }

        /* --- PROFILE PULL ANIMATION --- */
        .profile-container {
            display: flex; flex-direction: column; align-items: center; text-align: center;
            padding: 130px 20px 40px; width: 100%; max-width: 1000px; margin: 0 auto;
            transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: grab;
        }

        .profile-image-wrapper {
            width: 140px; height: 140px; border-radius: 50%; overflow: hidden; border: 4px solid white;
            box-shadow: 0 15px 40px rgba(0,0,0,0.1); flex-shrink: 0;
            transition: all 0.5s ease;
        }

        .is-pulled-left { flex-direction: row !important; text-align: left !important; align-items: flex-start !important; padding: 110px 25px 30px !important; }
        .is-pulled-left .profile-image-wrapper { width: 90px; height: 90px; border-radius: 20px; margin-right: 20px; margin-bottom: 0; }
        .is-pulled-left .scroll-indicator { opacity: 0; visibility: hidden; }
        .is-pulled-left .sosmed-profile, .is-pulled-left .quick-tabs { justify-content: flex-start; }

        .scroll-indicator { font-size: 14px; color: var(--gold); margin-bottom: 15px; animation: bounce 2s infinite; cursor: pointer; }
        @keyframes bounce { 0%, 20%, 50%, 80%, 100% {transform: translateY(0);} 40% {transform: translateY(8px);} }

        /* --- SOSMED --- */
        .sosmed-profile { display: flex; gap: 12px; margin-top: 15px; justify-content: center; }
        .sosmed-profile a { width: 35px; height: 35px; border-radius: 50%; background: white; border: 1px solid #eee; display: flex; align-items: center; justify-content: center; font-size: 14px; }

        /* --- UNIT CARDS & PREVIEW --- */
        .unit-card { background: var(--cream-light); border-radius: 2.5rem; overflow: hidden; border: 1px solid var(--champagne); display: flex; flex-direction: column; }
        .hero-view { width: 100%; aspect-ratio: 1/1; position: relative; overflow: hidden; background: #f9f7f4; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .hero-view img { width: 100%; height: 100%; object-fit: cover; transition: 0.4s; }
        
        .preview-label { position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.6); color: white; padding: 5px 12px; border-radius: 20px; font-size: 9px; font-weight: bold; text-transform: uppercase; z-index: 10; pointer-events: none; }

        .swiper-container-custom { width: 100%; aspect-ratio: 16/9; border-radius: 1.5rem; overflow: hidden; }
        
        .quick-tabs { display: flex; gap: 10px; justify-content: center; margin-top: 15px; }
        .tab-btn { padding: 10px 18px; background: white; border-radius: 50px; font-size: 9px; font-weight: 800; border: 1px solid #eee; display: flex; align-items: center; gap: 5px; text-transform: uppercase; }

        .phase-btn { padding: 12px 28px; border-radius: 14px; font-size: 11px; font-weight: 800; border: 1px solid #eee; background: white; transition: 0.3s; }
        .phase-btn.active { background: var(--dark); color: white !important; }
    </style>
</head>
<body>

    <nav class="fixed top-0 w-full nav-glass px-6 py-5 flex justify-between items-center">
        <div class="font-extrabold text-sm tracking-tighter uppercase">NEFSI ASRIFAH <span class="text-[#a68966]">| ECHI</span></div>
    </nav>

    <header id="top">
        <div class="profile-container" id="draggable-profile">
            <div class="profile-image-wrapper">
                <img src="wajah.jpg" class="w-full h-full object-cover" onerror="this.src='https://placehold.co/400x400?text=Echi'">
            </div>
            <div class="profile-text-content">
                <div class="scroll-indicator"><i class="fa-solid fa-chevron-down"></i></div>
                <span class="text-[9px] font-bold text-[#a68966] uppercase tracking-[0.3em] mb-1 block">Property Consultant</span>
                <h1 class="text-3xl font-black tracking-tighter mb-2 uppercase">Estate by Echi</h1>
                <p class="text-gray-400 text-[10px] max-w-[280px] leading-tight font-medium">Tarik profil ke bawah untuk tampilan lebih ringkas.</p>
                
                <div class="sosmed-profile">
                    <a href="https://www.instagram.com/lippokarawaci.id" target="_blank"><i class="fa-brands fa-instagram"></i></a>
                    <a href="https://www.tiktok.com/@parkserponghomes" target="_blank"><i class="fa-brands fa-tiktok"></i></a>
                    <a href="https://wa.me/6281119001899" target="_blank"><i class="fa-brands fa-whatsapp"></i></a>
                </div>

                <div class="quick-tabs">
                    <a href="#katalog" class="tab-btn"><i class="fa-solid fa-house"></i> Unit</a>
                    <a href="#kpr" class="tab-btn"><i class="fa-solid fa-calculator"></i> KPR</a>
                </div>
            </div>
        </div>
    </header>

    <section id="katalog" class="py-10 px-6">
        <div class="max-w-6xl mx-auto text-center">
            <div class="flex gap-2 overflow-x-auto no-scrollbar mb-10 pb-2 justify-center">
                <button onclick="renderUnits(7)" id="btn-7" class="phase-btn active">FASE 07</button>
                <button onclick="renderUnits(6)" id="btn-6" class="phase-btn">FASE 06</button>
                <button onclick="renderUnits(5)" id="btn-5" class="phase-btn">FASE 05</button>
            </div>
            <div id="unit-list" class="grid md:grid-cols-2 gap-8 text-left"></div>
        </div>
    </section>

    <section id="kpr" class="py-20 px-6 bg-white border-t">
        <div class="max-w-4xl mx-auto">
            <h3 class="text-center font-black uppercase text-[#a68966] mb-12 tracking-widest text-xs">Simulasi Cicilan</h3>
            <div class="grid md:grid-cols-2 gap-8 items-center">
                <div class="space-y-4">
                    <div class="bg-[#fdfcf9] p-7 rounded-3xl border border-[#f0ebe3]">
                        <label class="text-[9px] font-bold text-gray-400 uppercase block mb-2">Harga Unit</label>
                        <div class="flex items-center">
                            <span class="text-gray-400 font-bold mr-2 text-xl">Rp</span>
                            <input type="text" id="kpr-disp" value="325.000.000" oninput="formatAndCalc(this)" class="w-full bg-transparent border-none outline-none text-2xl font-black tracking-tighter">
                        </div>
                        <input type="hidden" id="kpr-raw" value="325000000">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="bg-[#fdfcf9] p-5 rounded-2xl border border-[#f0ebe3]">
                            <label class="text-[9px] font-bold text-gray-400 uppercase block mb-1">DP (%)</label>
                            <input type="number" id="dp-val" value="5" oninput="calc()" class="w-full bg-transparent border-none font-bold text-xl outline-none">
                        </div>
                        <div class="bg-[#fdfcf9] p-5 rounded-2xl border border-[#f0ebe3]">
                            <label class="text-[9px] font-bold text-gray-400 uppercase block mb-1">Tenor (Thn)</label>
                            <input type="number" id="tenor-val" value="20" oninput="calc()" class="w-full bg-transparent border-none font-bold text-xl outline-none">
                        </div>
                    </div>
                </div>
                <div class="bg-[#2d241d] p-12 rounded-[2.5rem] text-center text-white shadow-2xl">
                    <p class="text-[9px] font-bold text-gray-400 uppercase mb-3">Estimasi Cicilan</p>
                    <span id="hasil-cicilan" class="text-4xl md:text-5xl font-black block mb-8">Rp 2.050.000</span>
                    <button onclick="sendToWA()" class="w-full py-5 bg-[#a68966] text-white rounded-2xl font-bold text-[11px] uppercase tracking-widest hover:brightness-110 transition">Konsultasi ke Echi</button>
                </div>
            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        const WA_NUMBER = "6281119001899";
        let selectedUnitName = "General Park Serpong";

        // --- DRAG LOGIC ---
        const profile = document.getElementById('draggable-profile');
        let startY = 0;
        profile.addEventListener('touchstart', (e) => startY = e.touches[0].pageY);
        profile.addEventListener('touchmove', (e) => {
            const diff = e.touches[0].pageY - startY;
            if (diff > 60) profile.classList.add('is-pulled-left');
            else if (diff < -30) profile.classList.remove('is-pulled-left');
        });
        profile.querySelector('.scroll-indicator').addEventListener('click', () => profile.classList.toggle('is-pulled-left'));

        // --- DATA UNIT LENGKAP ---
        const unitData = {
            7: [
                { name: "Perunggu Beverly Livin", tag: "325 Jt", val: 325000000, desc: "Gaya Beverly Hills di Serpong.", bed: 2, bath: 1, floor: 1, photos: ["unit-1.jpg", "unit-1.1.jpg", "unit-1.2.jpg"] },
                { name: "Silver Beverly Livin", tag: "410 Jt", val: 410000000, desc: "Sentuhan mewah modern.", bed: 2, bath: 2, floor: 2, photos: ["unit-2.jpg", "unit-2.1.jpg", "unit-2.2.jpg"] },
                { name: "Urban Beverly Livin", tag: "500 Jt", val: 500000000, desc: "Gaya hidup perkotaan dinamis.", bed: 3, bath: 2, floor: 2, photos: ["unit-3.jpg", "unit-3.1.jpg", "unit-3.2.jpg"] }
            ],
            6: [
                { name: "Perunggu Livin Tipe B", tag: "315 Jt", val: 315000000, desc: "Modern compact living.", bed: 2, bath: 1, floor: 1, photos: ["unit-4.jpg", "unit-4.1.jpg", "unit-4.2.jpg"] },
                { name: "Quartz Livin Tipe Q", tag: "460 Jt", val: 460000000, desc: "Desain elegan fungsional.", bed: 2, bath: 2, floor: 2, photos: ["unit-5.jpg", "unit-5.1.jpg", "unit-5.2.jpg"] }
            ],
            5: [
                { name: "Perunggu Livin Tipe B", tag: "305 Jt", val: 305000000, desc: "Hunian nyaman harga terjangkau.", bed: 2, bath: 1, floor: 1, photos: ["unit-6.jpg", "unit-6.1.jpg", "unit-6.2.jpg"] }
            ]
        };

        function changeHero(uid, src, isMain) {
            const hero = document.getElementById(`hero-${uid}`);
            const label = document.getElementById(`label-${uid}`);
            hero.style.opacity = '0.4';
            setTimeout(() => {
                hero.src = src;
                hero.style.opacity = '1';
                label.innerText = isMain ? "Klik foto untuk melihat" : "Kembali ke foto utama";
            }, 200);
        }

        function renderUnits(fase) {
            const list = document.getElementById('unit-list');
            list.innerHTML = '';
            document.querySelectorAll('.phase-btn').forEach(b => b.classList.toggle('active', b.id === `btn-${fase}`));
            
            unitData[fase].forEach((u, i) => {
                const uid = `u-${fase}-${i}`;
                const mainImg = u.photos[0];
                const slides = u.photos.slice(1).map(p => `
                    <div class="swiper-slide cursor-pointer" onclick="changeHero('${uid}', '${p}', false)">
                        <img src="${p}" class="w-full h-full object-cover">
                    </div>`).join('');
                
                list.innerHTML += `
                    <div class="unit-card">
                        <div class="hero-view" onclick="changeHero('${uid}', '${mainImg}', true)">
                            <img src="${mainImg}" id="hero-${uid}">
                            <div class="preview-label" id="label-${uid}">Klik foto untuk melihat</div>
                        </div>
                        <div class="py-4 px-4 border-b">
                            <div class="swiper swiper-container-custom" id="sw-${uid}">
                                <div class="swiper-wrapper">${slides}</div>
                            </div>
                        </div>
                        <div class="p-8 flex flex-col flex-grow">
                            <h4 class="font-black text-xl uppercase mb-2">${u.name}</h4>
                            <p class="font-bold text-[#a68966] mb-4">Rp ${u.tag}</p>
                            <p class="text-[10px] text-gray-500 mb-6 flex-grow">${u.desc}</p>
                            <div class="grid grid-cols-2 gap-3">
                                <button onclick="setKPR('${u.name}', ${u.val})" class="bg-white border py-3 rounded-xl font-bold text-[9px] uppercase">Simulasi</button>
                                <a href="https://wa.me/${WA_NUMBER}?text=Halo Echi, saya tertarik ${u.name}" class="bg-[#2d241d] text-white py-3 rounded-xl font-bold text-[9px] flex items-center justify-center uppercase">Chat Echi</a>
                            </div>
                        </div>
                    </div>`;
            });

            setTimeout(() => {
                unitData[fase].forEach((u, i) => {
                    new Swiper(`#sw-u-${fase}-${i}`, {
                        autoplay: { delay: 2500, disableOnInteraction: false },
                        loop: true,
                    });
                });
            }, 100);
        }

        function formatRibuan(n) { return n.toString().replace(/\B(?=(\d{3})+(?!\d))/g, "."); }
        function formatAndCalc(el) { let v = el.value.replace(/\D/g, ""); document.getElementById('kpr-raw').value = v; el.value = formatRibuan(v); calc(); }
        function calc() {
            const h = parseFloat(document.getElementById('kpr-raw').value) || 0;
            const dp = parseFloat(document.getElementById('dp-val').value) || 5;
            const t = parseFloat(document.getElementById('tenor-val').value) || 20;
            const p = h - (h * dp / 100);
            const r = 0.05 / 12;
            const n = t * 12;
            const c = (p * r) / (1 - Math.pow(1 + r, -n));
            document.getElementById('hasil-cicilan').innerText = "Rp " + formatRibuan(Math.round(c || 0));
        }
        function setKPR(name, v) { 
            selectedUnitName = name;
            document.getElementById('kpr-raw').value = v; 
            document.getElementById('kpr-disp').value = formatRibuan(v); 
            calc(); 
            document.getElementById('kpr').scrollIntoView({ behavior: 'smooth' }); 
        }
        function sendToWA() {
            const harga = document.getElementById('kpr-disp').value;
            const dp = document.getElementById('dp-val').value;
            const tenor = document.getElementById('tenor-val').value;
            const cicilan = document.getElementById('hasil-cicilan').innerText;
            const text = `Halo Echi, saya ingin konsultasi mengenai unit: %0A%0A*Unit:* ${selectedUnitName}%0A*Harga:* Rp ${harga}%0A*DP:* ${dp}%%0A*Tenor:* ${tenor} Tahun%0A*Estimasi Cicilan:* ${cicilan}`;
            window.open(`https://wa.me/${WA_NUMBER}?text=${text}`, '_blank');
        }

        window.onload = () => { renderUnits(7); calc(); };
    </script>
</body>
</html>
