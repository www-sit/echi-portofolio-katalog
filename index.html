<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nefsi Asrifah | Echi - Official Property Catalog</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        
        :root {
            --gold: #a68966;
            --dark: #4a3728;
            --cream: #fdfbf7;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--cream); 
            color: var(--dark); 
            margin: 0;
            scroll-behavior: smooth;
        }

        .nav-glass { background: rgba(253, 251, 247, 0.96); backdrop-filter: blur(10px); z-index: 1000; }
        
        /* TOMBOL FASE STYLING */
        .phase-btn {
            background-color: white;
            color: var(--dark);
            border: 2px solid #e5e7eb;
            transition: all 0.3s ease;
            min-width: 130px;
            white-space: nowrap;
        }
        .phase-btn.active {
            background-color: var(--dark);
            color: white;
            border-color: var(--dark);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        /* CONTAINER FOTO UNIT */
        .unit-img-wrapper {
            background-color: #000;
            border-radius: 2rem;
            height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            margin-bottom: 1.5rem;
            position: relative;
        }
        
        .unit-img-main {
            max-height: 100%;
            width: auto;
            object-fit: contain;
            mix-blend-mode: screen; 
            filter: contrast(1.1) brightness(1.1);
        }

        .unit-card {
            background: white;
            padding: 1.25rem;
            border-radius: 2.5rem;
            box-shadow: 0 10px 30px -5px rgba(0,0,0,0.04);
        }

        /* MODAL GALERI */
        #gallery-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.98);
            z-index: 9999;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
        #gallery-overlay.active { display: flex; }
        .gallery-img {
            max-height: 80vh;
            max-width: 90%;
            border-radius: 1.5rem;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <nav class="fixed w-full nav-glass px-6 py-5 border-b border-gray-100">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="font-extrabold text-xl tracking-tighter uppercase text-[#4a3728]">NEFSI ASRIFAH | <span class="text-[#a68966]">ECHI</span></div>
        </div>
    </nav>

    <section class="pt-32 pb-24 px-6">
        <div class="max-w-7xl mx-auto">
            <div class="flex gap-4 overflow-x-auto no-scrollbar pb-10 mb-8 justify-start md:justify-center">
                <button onclick="renderGrid(7)" id="btn-7" class="phase-btn px-8 py-4 rounded-2xl font-bold text-[10px] uppercase tracking-widest">Fase 7</button>
                <button onclick="renderGrid(6)" id="btn-6" class="phase-btn px-8 py-4 rounded-2xl font-bold text-[10px] uppercase tracking-widest">Fase 6</button>
                <button onclick="renderGrid(5)" id="btn-5" class="phase-btn px-8 py-4 rounded-2xl font-bold text-[10px] uppercase tracking-widest">Fase 5</button>
            </div>

            <div id="unit-grid" class="grid md:grid-cols-2 lg:grid-cols-3 gap-8">
                </div>
        </div>
    </section>

    <section id="kpr" class="py-20 px-6 bg-white rounded-[4rem] mx-4 shadow-xl border border-gray-50 mb-20">
        <div class="max-w-4xl mx-auto">
            <h3 class="text-2xl font-black text-center mb-12 uppercase tracking-widest">Simulasi KPR</h3>
            <div class="grid md:grid-cols-2 gap-12">
                <div class="space-y-8">
                    <div>
                        <label class="text-[10px] font-bold text-gray-400 uppercase mb-2 block">Harga Unit (Rp)</label>
                        <input type="text" id="kpr-disp" value="305.000.000" oninput="formatInput(this)" class="w-full text-2xl font-black outline-none bg-transparent border-b-2 border-gray-100">
                        <input type="hidden" id="kpr-raw" value="305000000">
                    </div>
                    <div class="flex gap-6">
                        <div class="w-1/2 border-b border-gray-100">
                            <label class="text-[10px] font-bold text-gray-400 uppercase mb-1 block">DP (%)</label>
                            <input type="number" id="kpr-dp" value="5" oninput="calculateKPR()" class="w-full font-bold outline-none">
                        </div>
                        <div class="w-1/2 border-b border-gray-100">
                            <label class="text-[10px] font-bold text-gray-400 uppercase mb-1 block">Tenor (Thn)</label>
                            <input type="number" id="kpr-tenor" value="20" oninput="calculateKPR()" class="w-full font-bold outline-none">
                        </div>
                    </div>
                </div>
                <div class="bg-[#fdfbf7] p-10 rounded-[2.5rem] text-center">
                    <span class="text-[10px] font-bold text-gray-400 uppercase mb-2">Estimasi Angsuran</span>
                    <h4 id="kpr-res" class="text-4xl font-black text-[#a68966] mb-8">Rp 1.900.000</h4>
                    <button onclick="sendKPR()" class="w-full bg-[#4a3728] text-white py-4 rounded-xl font-bold text-[10px] uppercase tracking-widest shadow-lg hover:bg-[#a68966] transition-all">Hubungi Echi</button>
                </div>
            </div>
        </div>
    </section>

    <div id="gallery-overlay" onclick="closeGallery()">
        <button class="absolute top-8 right-8 text-white text-3xl z-50"><i class="fas fa-times"></i></button>
        <div class="relative w-full flex items-center justify-center" onclick="event.stopPropagation()">
            <button onclick="changeImg(-1)" class="absolute left-4 md:left-10 text-white/50 hover:text-white text-5xl"><i class="fas fa-chevron-left"></i></button>
            <img id="modal-img" src="" class="gallery-img shadow-2xl">
            <button onclick="changeImg(1)" class="absolute right-4 md:right-10 text-white/50 hover:text-white text-5xl"><i class="fas fa-chevron-right"></i></button>
        </div>
        <div id="counter" class="mt-8 text-white/60 font-bold text-[10px] uppercase tracking-[0.4em]"></div>
    </div>

    <footer class="py-12 text-center text-gray-300 text-[10px] font-bold uppercase tracking-[0.5em]">
        Nefsi Asrifah | Park Serpong 2026
    </footer>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        const WA_NUM = "628111982833";

        const unitData = {
            5: [
                { name: "Perunggu Livin Tipe B", tag: "305 Jt", val: 305000000, photos: ["unit-1.jpg", "unit-1.1.jpg", "unit-1.2.jpg", "unit-1.3.jpg"] },
                { name: "Perunggu Livin Tipe BB", tag: "390 Jt", val: 390000000, photos: ["unit-2.jpg", "unit-2.1.jpg", "unit-2.2.jpg", "unit-2.3.jpg"] },
                { name: "Quartz Livin Tipe Q", tag: "450 Jt", val: 450000000, photos: ["unit-3.jpg", "unit-3.1.jpg", "unit-3.2.jpg", "unit-3.3.jpg"] },
                { name: "TreeTops Livin Tipe", tag: "520 Jt", val: 520000000, photos: ["unit-4.jpg", "unit-4.1.jpg", "unit-4.2.jpg", "unit-4.3.jpg", "unit-4.4.jpg"] },
                { name: "Gold Livin Tipe G", tag: "580 Jt", val: 580000000, photos: ["unit-5.jpg", "unit-5.1.jpg", "unit-5.2.jpg"] },
                { name: "GoldTops Livin Type GT", tag: "650 Jt", val: 650000000, photos: ["unit-6.jpg", "unit-6.1.jpg"] }
            ],
            6: [
                { name: "Perunggu Livin Tipe B", tag: "315 Jt", val: 315000000, photos: ["unit-1.jpg", "unit-1.1.jpg", "unit-1.2.jpg", "unit-1.3.jpg"] },
                { name: "Quartz Livin Tipe Q", tag: "460 Jt", val: 460000000, photos: ["unit-2.jpg", "unit-2.1.jpg", "unit-2.2.jpg", "unit-2.3.jpg"] },
                { name: "TreeTops Livin", tag: "530 Jt", val: 530000000, photos: ["unit-3.jpg", "unit-3.1.jpg", "unit-3.2.jpg", "unit-3.3.jpg"] },
                { name: "Gold Livin Tipe G", tag: "595 Jt", val: 595000000, photos: ["unit-4.jpg", "unit-4.1.jpg", "unit-4.2.jpg", "unit-4.3.jpg"] },
                { name: "GoldTops Livin Type GT", tag: "670 Jt", val: 670000000, photos: ["unit-5.jpg", "unit-5.1.jpg", "unit-5.2.jpg", "unit-5.3.jpg", "unit-5.4.jpg"] }
            ],
            7: [
                { name: "Perunggu Beverly Livin", tag: "325 Jt", val: 325000000, photos: ["unit-1.jpg", "unit-1.1.jpg", "unit-1.2.jpg", "unit-1.3.jpg"] },
                { name: "Silver Beverly Livin", tag: "410 Jt", val: 410000000, photos: ["unit-2.jpg", "unit-2.1.jpg", "unit-2.2.jpg", "unit-2.3.jpg"] },
                { name: "Urban Beverly Livin", tag: "500 Jt", val: 500000000, photos: ["unit-3.jpg", "unit-3.1.jpg", "unit-3.2.jpg", "unit-3.3.jpg"] },
                { name: "TreeTops Beverly Livin", tag: "550 Jt", val: 550000000, photos: ["unit-4.jpg", "unit-4.1.jpg", "unit-4.2.jpg", "unit-4.3.jpg"] },
                { name: "Gold Beverly Livin", tag: "610 Jt", val: 610000000, photos: ["unit-5.jpg", "unit-5.1.jpg", "unit-5.2.jpg", "unit-5.3.jpg"] },
                { name: "GoldTops Beverly Livin", tag: "690 Jt", val: 690000000, photos: ["unit-6.jpg", "unit-6.1.jpg", "unit-6.2.jpg", "unit-6.3.jpg"] }
            ]
        };

        let activePhotos = [];
        let currentIdx = 0;

        function renderGrid(phase) {
            document.querySelectorAll('.phase-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-'+phase).classList.add('active');
            const grid = document.getElementById('unit-grid');
            grid.innerHTML = '';
            
            unitData[phase].forEach((u, i) => {
                grid.innerHTML += `
                    <div class="unit-card" data-aos="fade-up" data-aos-delay="${i*100}">
                        <div class="unit-img-wrapper cursor-pointer" onclick="openGallery(${phase}, ${i})">
                            <img src="phase-${phase}/${u.photos[0]}" class="unit-img-main" onerror="this.src='https://placehold.co/600x400?text=${u.name}'">
                            <div class="absolute bottom-4 right-4 bg-black/50 text-white text-[9px] px-3 py-1 rounded-full backdrop-blur-sm">
                                <i class="fas fa-images mr-1"></i> ${u.photos.length} Foto
                            </div>
                        </div>
                        <h4 class="text-lg font-black uppercase text-[#4a3728] mb-1">${u.name}</h4>
                        <p class="text-[9px] font-bold text-gray-400 uppercase tracking-widest mb-6">Park Serpong • Fase ${phase}</p>
                        <p class="text-3xl font-black italic text-[#4a3728] mb-8">Rp ${u.tag}</p>
                        <div class="flex gap-3">
                            <button onclick="setKPR(${u.val})" class="flex-1 py-4 border-2 border-gray-100 rounded-2xl font-bold text-[10px] uppercase">KPR</button>
                            <button onclick="chatWA('${u.name}')" class="flex-1 py-4 bg-[#a68966] text-white rounded-2xl font-bold text-[10px] uppercase shadow-lg shadow-[#a68966]/20">WhatsApp</button>
                        </div>
                    </div>
                `;
            });
            AOS.refresh();
        }

        function openGallery(phase, unitIdx) {
            activePhotos = unitData[phase][unitIdx].photos.map(p => `phase-${phase}/${p}`);
            currentIdx = 0;
            updateModal();
            document.getElementById('gallery-overlay').classList.add('active');
            document.body.style.overflow = 'hidden';
        }
        function closeGallery() { document.getElementById('gallery-overlay').classList.remove('active'); document.body.style.overflow = 'auto'; }
        function updateModal() {
            document.getElementById('modal-img').src = activePhotos[currentIdx];
            document.getElementById('counter').innerText = `Gambar ${currentIdx + 1} / ${activePhotos.length}`;
        }
        function changeImg(dir) { currentIdx = (currentIdx + dir + activePhotos.length) % activePhotos.length; updateModal(); }

        function formatIDR(n) { return n.toString().replace(/\B(?=(\d{3})+(?!\d))/g, "."); }
        function formatInput(el) {
            let v = el.value.replace(/\D/g, "");
            document.getElementById('kpr-raw').value = v;
            el.value = formatIDR(v);
            calculateKPR();
        }
        function calculateKPR() {
            const h = parseFloat(document.getElementById('kpr-raw').value) || 0;
            const d = parseFloat(document.getElementById('kpr-dp').value) || 0;
            const t = parseFloat(document.getElementById('kpr-tenor').value) || 0;
            const p = h * (1 - (d/100));
            const r = 0.05 / 12;
            const n = t * 12;
            const res = n > 0 ? (p * r) / (1 - Math.pow(1 + r, -n)) : 0;
            document.getElementById('kpr-res').innerText = "Rp " + formatIDR(Math.round(res));
        }
        function setKPR(v) {
            document.getElementById('kpr-raw').value = v;
            document.getElementById('kpr-disp').value = formatIDR(v);
            calculateKPR();
            document.getElementById('kpr').scrollIntoView({behavior: 'smooth'});
        }
        function chatWA(n) { window.open(`https://wa.me/${WA_NUM}?text=Halo Kak Echi, tanya unit ${n}`, '_blank'); }
        function sendKPR() {
            const h = document.getElementById('kpr-disp').value;
            const r = document.getElementById('kpr-res').innerText;
            window.open(`https://wa.me/${WA_NUM}?text=Halo Kak Echi, simulasi KPR Rp ${h} angsuran ${r}`, '_blank');
        }

        window.onload = () => { AOS.init({ duration: 800, once: true }); renderGrid(7); }
    </script>
</body>
    </html>
