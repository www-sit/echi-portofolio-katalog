<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nefsi Asrifah | Echi - Property Consultant</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        
        :root {
            --gold: #a68966;
            --dark: #4a3728;
            --cream: #fdfbf7;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--cream); 
            color: var(--dark); 
            margin: 0;
            scroll-behavior: smooth;
        }

        .nav-glass { background: rgba(253, 251, 247, 0.96); backdrop-filter: blur(10px); z-index: 1000; }
        
        /* Profile Layout */
        .profile-wrapper {
            background: white;
            border-radius: 3rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.03);
            border: 1px solid rgba(0,0,0,0.02);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            max-width: 900px;
            margin: 0 auto;
        }
        @media (min-width: 768px) {
            .profile-wrapper { flex-direction: row; align-items: stretch; }
            .profile-img-side { width: 35%; }
            .profile-info-side { width: 65%; padding: 3rem; }
        }

        .social-link {
            width: 40px; height: 40px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 50%; background: #f8f5f0; color: var(--dark);
            transition: all 0.3s ease; text-decoration: none;
        }
        .social-link:hover { background: var(--gold); color: white; transform: translateY(-3px); }

        .nav-buttons-container {
            max-width: 900px; margin: 2rem auto 0;
            display: flex; gap: 12px; padding: 0 15px;
        }
        .btn-nav-indie {
            flex: 1; background: white; padding: 15px; border-radius: 1.5rem;
            text-align: center; font-weight: 800; font-size: 11px;
            text-transform: uppercase; letter-spacing: 1px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            border: 1px solid rgba(166,137,102,0.1); color: var(--dark);
            text-decoration: none; display: flex; align-items: center; justify-content: center;
            gap: 8px; transition: all 0.3s;
        }
        .btn-nav-indie:hover { background: var(--gold); color: white; transform: translateY(-2px); }

        /* Unit Gallery Layout - Split Top & Bottom */
        .unit-card {
            background: white; border-radius: 2.5rem; padding: 1.5rem;
            border: 1px solid #f0f0f0; margin-bottom: 2rem;
        }
        
        /* Foto Utama di Atas */
        .main-photo-container {
            width: 100%; height: 350px; border-radius: 2rem;
            overflow: hidden; background: #f9f9f9; margin-bottom: 20px;
            position: relative;
        }
        
        /* Foto Pendukung di Bawah dengan Navigasi */
        .gallery-nav-section {
            position: relative; display: flex; align-items: center; gap: 10px;
            margin-bottom: 1.5rem;
        }
        
        .thumbnail-scroll {
            display: flex; gap: 10px; overflow-x: auto;
            scroll-behavior: smooth; scrollbar-width: none;
            padding: 5px 0; flex: 1;
        }
        .thumbnail-scroll::-webkit-scrollbar { display: none; }
        
        .thumb-img {
            min-width: 100px; height: 75px; border-radius: 1.2rem;
            object-fit: cover; cursor: pointer; border: 3px solid transparent;
            transition: all 0.2s; flex-shrink: 0;
        }
        .thumb-img.active { border-color: var(--gold); transform: scale(0.95); opacity: 0.8; }
        
        .nav-arrow {
            background: var(--dark); color: white; width: 35px; height: 35px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; z-index: 10; transition: 0.3s;
        }
        .nav-arrow:hover { background: var(--gold); }

        .kpr-result-box {
            background: #f8f5f0; padding: 2.5rem; border-radius: 2.5rem;
            text-align: center; border: 1px solid #f0ebe3;
        }
        .kpr-value {
            font-size: 2.5rem; font-weight: 800; color: var(--gold);
            line-height: 1.2; margin: 10px 0;
        }

        @media (max-width: 640px) {
            .nav-buttons-container { flex-direction: column; }
            .main-photo-container { height: 250px; }
            .thumb-img { min-width: 80px; height: 60px; }
        }
    </style>
</head>
<body>

    <nav class="fixed w-full nav-glass px-6 py-4 border-b border-gray-50">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="font-extrabold text-lg tracking-tighter uppercase">NEFSI ASRIFAH <span class="text-[#a68966]">| ECHI</span></div>
            <a href="https://wa.me/628111982833" target="_blank" class="bg-[#4a3728] text-white px-5 py-2 rounded-full text-[10px] font-bold uppercase tracking-widest">WhatsApp</a>
        </div>
    </nav>

    <div class="pt-32 pb-10 px-6">
        <div class="max-w-6xl mx-auto">
            <div class="profile-wrapper" data-aos="fade-up">
                <div class="profile-img-side">
                    <img src="wajah.jpg" class="w-full h-full object-cover" onerror="this.src='https://images.unsplash.com/photo-1560250097-0b93528c311a?q=80&w=1974&auto=format&fit=crop'">
                </div>
                <div class="profile-info-side p-8">
                    <span class="text-[10px] font-black text-[#a68966] uppercase tracking-[0.4em] mb-3 block">Official Sales Specialist</span>
                    <h1 class="text-3xl font-black text-[#4a3728] mb-3 tracking-tight">Halo, saya Echi</h1>
                    <p class="text-gray-500 font-medium leading-relaxed text-sm mb-6">Property Consultant resmi Park Serpong. Temukan pilihan hunian terbaik dengan simulasi cicilan transparan.</p>
                    
                    <div class="flex gap-4">
                        <a href="https://wa.me/628111982833" target="_blank" class="social-link"><i class="fa-brands fa-whatsapp"></i></a>
                        <a href="https://tiktok.com" target="_blank" class="social-link"><i class="fa-brands fa-tiktok"></i></a>
                        <a href="https://instagram.com" target="_blank" class="social-link"><i class="fa-brands fa-instagram"></i></a>
                    </div>
                </div>
            </div>

            <div class="nav-buttons-container" data-aos="fade-up" data-aos-delay="100">
                <a href="#katalog" class="btn-nav-indie"><i class="fa-solid fa-house"></i> Katalog</a>
                <a href="#kpr" class="btn-nav-indie"><i class="fa-solid fa-calculator"></i> Hitung KPR</a>
            </div>
        </div>
    </div>

    <section id="katalog" class="py-10 px-6">
        <div class="max-w-7xl mx-auto">
            <div class="flex flex-col md:flex-row justify-between items-center mb-10 gap-4">
                <h2 class="text-3xl font-black uppercase tracking-tighter">Pilihan Unit</h2>
                <div class="flex gap-2">
                    <button onclick="renderUnits(7)" id="p-7" class="px-5 py-2 rounded-full text-[10px] font-bold border phase-btn">FASE 07</button>
                    <button onclick="renderUnits(6)" id="p-6" class="px-5 py-2 rounded-full text-[10px] font-bold border phase-btn">FASE 06</button>
                    <button onclick="renderUnits(5)" id="p-5" class="px-5 py-2 rounded-full text-[10px] font-bold border phase-btn">FASE 05</button>
                </div>
            </div>
            <div id="grid-container" class="grid grid-cols-1 lg:grid-cols-2 gap-8"></div>
        </div>
    </section>

    <section id="kpr" class="py-20 px-6">
        <div class="max-w-4xl mx-auto bg-white p-8 md:p-12 rounded-[3rem] shadow-sm border border-gray-100">
            <h3 class="text-2xl font-black text-center mb-10">Simulasi Cicilan</h3>
            <div class="grid md:grid-cols-2 gap-10">
                <div class="space-y-6">
                    <div>
                        <label class="text-[10px] font-bold text-gray-400 uppercase mb-2 block">Harga Properti (Rp)</label>
                        <input type="text" id="kpr-disp" value="325.000.000" oninput="handleInput(this)" class="w-full text-2xl font-black outline-none border-b-2 border-gray-100 focus:border-[#a68966] bg-transparent pb-2">
                        <input type="hidden" id="kpr-raw" value="325000000">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="text-[10px] font-bold text-gray-400 uppercase mb-2 block">DP (%)</label>
                            <select id="dp" onchange="calc()" class="w-full bg-gray-50 p-3 rounded-xl text-xs font-bold outline-none">
                                <option value="0">0%</option><option value="5" selected>5%</option><option value="10">10%</option>
                            </select>
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-gray-400 uppercase mb-2 block">Tenor</label>
                            <select id="tenor" onchange="calc()" class="w-full bg-gray-50 p-3 rounded-xl text-xs font-bold outline-none">
                                <option value="15">15 Thn</option><option value="20" selected>20 Thn</option><option value="25">25 Thn</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="kpr-result-box">
                    <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Estimasi Cicilan</p>
                    <h4 id="res-val" class="kpr-value">Rp 2.050.000</h4>
                    <p class="text-[9px] text-gray-400 font-medium">*Asumsi bunga 5% p.a fixed</p>
                </div>
            </div>
        </div>
    </section>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        const unitData = {
            5: [
                { id: "51", name: "Perunggu Livin Tipe B", tag: "305 Jt", val: 305000000, photos: ["unit-1.jpg", "unit-1.1.jpg", "unit-1.2.jpg", "unit-1.3.jpg"] },
                { id: "52", name: "Perunggu Livin Tipe BB", tag: "390 Jt", val: 390000000, photos: ["unit-2.jpg", "unit-2.1.jpg", "unit-2.2.jpg", "unit-2.3.jpg"] },
                { id: "53", name: "Quartz Livin Tipe Q", tag: "450 Jt", val: 450000000, photos: ["unit-3.jpg", "unit-3.1.jpg", "unit-3.2.jpg", "unit-3.3.jpg"] },
                { id: "54", name: "TreeTops Livin Tipe", tag: "520 Jt", val: 520000000, photos: ["unit-4.jpg", "unit-4.1.jpg", "unit-4.2.jpg", "unit-4.3.jpg", "unit-4.4.jpg"] },
                { id: "55", name: "Gold Livin Tipe G", tag: "580 Jt", val: 580000000, photos: ["unit-5.jpg", "unit-5.1.jpg", "unit-5.2.jpg", "unit-5.3.jpg"] },
                { id: "56", name: "GoldTops Livin Type GT", tag: "650 Jt", val: 650000000, photos: ["unit-6.jpg", "unit-6.1.jpg", "unit-6.2.jpg", "unit-6.3.jpg"] }
            ],
            6: [
                { id: "61", name: "Perunggu Livin Tipe B", tag: "315 Jt", val: 315000000, photos: ["unit-1.jpg", "unit-1.1.jpg", "unit-1.2.jpg", "unit-1.3.jpg"] },
                { id: "62", name: "Quartz Livin Tipe Q", tag: "460 Jt", val: 460000000, photos: ["unit-2.jpg", "unit-2.1.jpg", "unit-2.2.jpg", "unit-2.3.jpg"] },
                { id: "63", name: "TreeTops Livin", tag: "530 Jt", val: 530000000, photos: ["unit-3.jpg", "unit-3.1.jpg", "unit-3.2.jpg", "unit-3.3.jpg"] },
                { id: "64", name: "Gold Livin Tipe G", tag: "595 Jt", val: 595000000, photos: ["unit-4.jpg", "unit-4.1.jpg", "unit-4.2.jpg", "unit-4.3.jpg"] },
                { id: "65", name: "GoldTops Livin Type GT", tag: "670 Jt", val: 670000000, photos: ["unit-5.jpg", "unit-5.1.jpg", "unit-5.2.jpg", "unit-5.3.jpg", "unit-5.4.jpg"] }
            ],
            7: [
                { id: "71", name: "Perunggu Beverly Livin", tag: "325 Jt", val: 325000000, photos: ["unit-1.jpg", "unit-1.1.jpg", "unit-1.2.jpg", "unit-1.3.jpg"] },
                { id: "72", name: "Silver Beverly Livin", tag: "410 Jt", val: 410000000, photos: ["unit-2.jpg", "unit-2.1.jpg", "unit-2.2.jpg", "unit-2.3.jpg"] },
                { id: "73", name: "Urban Beverly Livin", tag: "500 Jt", val: 500000000, photos: ["unit-3.jpg", "unit-3.1.jpg", "unit-3.2.jpg", "unit-3.3.jpg"] },
                { id: "74", name: "TreeTops Beverly Livin", tag: "550 Jt", val: 550000000, photos: ["unit-4.jpg", "unit-4.1.jpg", "unit-4.2.jpg", "unit-4.3.jpg"] },
                { id: "75", name: "Gold Beverly Livin", tag: "610 Jt", val: 610000000, photos: ["unit-5.jpg", "unit-5.1.jpg", "unit-5.2.jpg", "unit-5.3.jpg"] },
                { id: "76", name: "GoldTops Beverly Livin", tag: "690 Jt", val: 690000000, photos: ["unit-6.jpg", "unit-6.1.jpg", "unit-6.2.jpg", "unit-6.3.jpg"] }
            ]
        };

        function renderUnits(phase) {
            document.querySelectorAll('.phase-btn').forEach(b => b.className = "px-5 py-2 rounded-full text-[10px] font-bold border phase-btn bg-white text-dark");
            document.getElementById('p-'+phase).className = "px-5 py-2 rounded-full text-[10px] font-bold border phase-btn bg-[#4a3728] text-white";

            const container = document.getElementById('grid-container');
            container.innerHTML = '';

            unitData[phase].forEach((u) => {
                const cardId = u.id;
                let thumbsHtml = u.photos.map((p, idx) => `
                    <img src="fase-${phase}/${p}" 
                         class="thumb-img ${idx===0?'active':''}" 
                         onclick="changeView('${cardId}', 'fase-${phase}/${p}', this)"
                         onerror="this.src='https://placehold.co/200x150?text=Park+Serpong'">
                `).join('');

                container.innerHTML += `
                    <div class="unit-card" data-aos="fade-up">
                        <!-- FOTO UTAMA ATAS -->
                        <div class="main-photo-container">
                            <img id="view-${cardId}" src="fase-${phase}/${u.photos[0]}" class="w-full h-full object-cover" onerror="this.src='https://placehold.co/800x600?text=Properti'">
                        </div>

                        <!-- FOTO PENDUKUNG BAWAH + PANAH -->
                        <div class="gallery-nav-section">
                            <div class="nav-arrow" onclick="scrollSide('${cardId}', -120)"><i class="fa-solid fa-chevron-left"></i></div>
                            <div id="scroll-${cardId}" class="thumbnail-scroll">
                                ${thumbsHtml}
                            </div>
                            <div class="nav-arrow" onclick="scrollSide('${cardId}', 120)"><i class="fa-solid fa-chevron-right"></i></div>
                        </div>

                        <!-- INFO UNIT -->
                        <div class="mt-4">
                            <p class="text-[9px] font-bold text-gray-400 uppercase tracking-widest mb-1">Park Serpong Fase ${phase}</p>
                            <h4 class="text-xl font-black text-[#4a3728] uppercase mb-4">${u.name}</h4>
                            <div class="flex justify-between items-end">
                                <div>
                                    <span class="text-[8px] font-bold text-gray-300 uppercase">Mulai Dari</span>
                                    <p class="text-2xl font-extrabold text-[#a68966]">Rp ${u.tag}</p>
                                </div>
                                <div class="flex gap-2">
                                    <button onclick="setKPR(${u.val})" class="p-3 bg-gray-50 rounded-xl border border-gray-100"><i class="fa-solid fa-calculator text-[#a68966]"></i></button>
                                    <a href="https://wa.me/628111982833" target="_blank" class="px-6 py-3 bg-[#a68966] text-white rounded-xl font-bold text-[10px] uppercase shadow-lg">Detail</a>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            });
            AOS.refresh();
        }

        function changeView(id, src, el) {
            document.getElementById('view-' + id).src = src;
            const parent = document.getElementById('scroll-' + id);
            parent.querySelectorAll('.thumb-img').forEach(img => img.classList.remove('active'));
            el.classList.add('active');
        }

        function scrollSide(id, dist) {
            document.getElementById('scroll-' + id).scrollBy({ left: dist, behavior: 'smooth' });
        }

        function formatIDR(n) { return n.toString().replace(/\B(?=(\d{3})+(?!\d))/g, "."); }
        function handleInput(el) {
            let v = el.value.replace(/\D/g, "");
            document.getElementById('kpr-raw').value = v;
            el.value = formatIDR(v);
            calc();
        }
        function calc() {
            const h = parseFloat(document.getElementById('kpr-raw').value) || 0;
            const t = parseInt(document.getElementById('tenor').value);
            const d = parseInt(document.getElementById('dp').value);
            const r = 0.05 / 12; const n = t * 12;
            if (h > 0) {
                const p = h * (1 - (d / 100));
                const res = (p * r) / (1 - Math.pow(1 + r, -n));
                document.getElementById('res-val').innerText = "Rp " + formatIDR(Math.round(res));
            }
        }
        function setKPR(v) {
            document.getElementById('kpr-raw').value = v;
            document.getElementById('kpr-disp').value = formatIDR(v);
            calc();
            document.getElementById('kpr').scrollIntoView({behavior: 'smooth'});
        }

        window.onload = () => { 
            AOS.init({ duration: 800, once: true }); 
            renderUnits(7); 
            calc();
        };
    </script>
</body>
</html>
